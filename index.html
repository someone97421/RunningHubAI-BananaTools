            imagePreviewState.scale = 1;
            imagePreviewState.offsetX = 0;
            imagePreviewState.offsetY = 0;
            img.style.width = `${baseWidth}px`;
            img.style.height = `${baseHeight}px`;
            applyImagePreviewTransform();
        }

        function getImagePreviewBounds(scale = imagePreviewState.scale) {
            const { viewport } = getImagePreviewElements();
            const scaledWidth = imagePreviewState.baseWidth * scale;
            const scaledHeight = imagePreviewState.baseHeight * scale;
            return {
                maxX: Math.max(0, (scaledWidth - viewport.clientWidth) / 2),
                maxY: Math.max(0, (scaledHeight - viewport.clientHeight) / 2),
                scaledWidth,
                scaledHeight
            };
        }

        function clampImagePreviewOffset() {
            const bounds = getImagePreviewBounds();
            imagePreviewState.offsetX = bounds.maxX > 0
                ? Math.min(Math.max(imagePreviewState.offsetX, -bounds.maxX), bounds.maxX)
                : 0;
            imagePreviewState.offsetY = bounds.maxY > 0
                ? Math.min(Math.max(imagePreviewState.offsetY, -bounds.maxY), bounds.maxY)
                : 0;
        }

        function applyImagePreviewTransform() {
            const { modal, img } = getImagePreviewElements();
            clampImagePreviewOffset();
            img.style.transform = `translate(-50%, -50%) translate(${imagePreviewState.offsetX}px, ${imagePreviewState.offsetY}px) scale(${imagePreviewState.scale})`;
            const bounds = getImagePreviewBounds();
            modal.classList.toggle('is-draggable', bounds.maxX > 0 || bounds.maxY > 0);
        }

        function setImagePreviewScaleAtPoint(nextScale, event) {
            const { viewport } = getImagePreviewElements();
            const oldScale = imagePreviewState.scale;
            if (Math.abs(nextScale - oldScale) < 0.001) return;

            const rect = viewport.getBoundingClientRect();
            const pointerX = event.clientX - rect.left - rect.width / 2;
            const pointerY = event.clientY - rect.top - rect.height / 2;
            imagePreviewState.offsetX = pointerX - (pointerX - imagePreviewState.offsetX) * (nextScale / oldScale);
            imagePreviewState.offsetY = pointerY - (pointerY - imagePreviewState.offsetY) * (nextScale / oldScale);
            imagePreviewState.scale = nextScale;
            applyImagePreviewTransform();
        }

        function getImagePreviewOriginalScale() {
            const { img } = getImagePreviewElements();
            if (!img.naturalWidth || !imagePreviewState.baseWidth) return 1;
            return Math.max(
                img.naturalWidth / imagePreviewState.baseWidth,
                img.naturalHeight / imagePreviewState.baseHeight,
                1
            );
        }

        function handleImagePreviewWheel(event) {
            const { modal } = getImagePreviewElements();
            if (!modal.classList.contains('active')) return;
            event.preventDefault();
            const oldScale = imagePreviewState.scale;
            const zoomStep = 0.24 / (1 + oldScale * 0.42);
            const zoomFactor = Math.exp(-event.deltaY * zoomStep / 100);
            const nextScale = Math.min(Math.max(oldScale * zoomFactor, 1), 10);
            setImagePreviewScaleAtPoint(nextScale, event);
        }

        function isPointInsideModalImage(event) {
            const { img } = getImagePreviewElements();
            const rect = img.getBoundingClientRect();
            return (
                event.clientX >= rect.left &&
                event.clientX <= rect.right &&
                event.clientY >= rect.top &&
                event.clientY <= rect.bottom
            );
        }

        function handleImagePreviewClick(event) {
            const { modal, img } = getImagePreviewElements();
            if (!modal.classList.contains('active')) return;
            if (event.detail > 1) return;
            if (imagePreviewState.suppressBackdropClick) {
                imagePreviewState.suppressBackdropClick = false;
                return;
            }
            if (event.target === img || isPointInsideModalImage(event)) {
                const originalScale = Math.min(getImagePreviewOriginalScale(), 10);
                const isOriginalSize = imagePreviewState.scale >= originalScale - 0.01;
                setImagePreviewScaleAtPoint(isOriginalSize ? 1 : originalScale, event);
                return;
            }
            closeImageModal();
        }

        function startImagePreviewDrag(event) {
            const { modal } = getImagePreviewElements();
            if (!modal.classList.contains('active')) return;
            if (!isPointInsideModalImage(event)) return;
            const bounds = getImagePreviewBounds();
            if (bounds.maxX <= 0 && bounds.maxY <= 0) return;
            event.preventDefault();
            imagePreviewState.dragging = true;
            imagePreviewState.dragStartX = event.clientX;
            imagePreviewState.dragStartY = event.clientY;
            imagePreviewState.dragOffsetX = imagePreviewState.offsetX;
            imagePreviewState.dragOffsetY = imagePreviewState.offsetY;
            imagePreviewState.suppressBackdropClick = false;
            modal.classList.add('is-dragging');
            event.currentTarget.setPointerCapture?.(event.pointerId);
        }

        function moveImagePreviewDrag(event) {
            if (!imagePreviewState.dragging) return;
            if (Math.abs(event.clientX - imagePreviewState.dragStartX) > 3 || Math.abs(event.clientY - imagePreviewState.dragStartY) > 3) {
                imagePreviewState.suppressBackdropClick = true;
            }
            imagePreviewState.offsetX = imagePreviewState.dragOffsetX + event.clientX - imagePreviewState.dragStartX;
            imagePreviewState.offsetY = imagePreviewState.dragOffsetY + event.clientY - imagePreviewState.dragStartY;
            applyImagePreviewTransform();
        }

        function stopImagePreviewDrag(event) {
            if (!imagePreviewState.dragging) return;
            imagePreviewState.dragging = false;
            const { modal } = getImagePreviewElements();
            modal.classList.remove('is-dragging');
            event.currentTarget?.releasePointerCapture?.(event.pointerId);
        }

        function initImagePreviewInteractions() {
            const { modal, viewport } = getImagePreviewElements();
            viewport.addEventListener('wheel', handleImagePreviewWheel, { passive: false });
            viewport.addEventListener('pointerdown', startImagePreviewDrag);
            viewport.addEventListener('pointermove', moveImagePreviewDrag);
            viewport.addEventListener('pointerup', stopImagePreviewDrag);
            viewport.addEventListener('pointercancel', stopImagePreviewDrag);
            viewport.addEventListener('click', handleImagePreviewClick);
            modal.addEventListener('dblclick', closeImageModal);
            window.addEventListener('resize', () => {
                if (modal.classList.contains('active')) {
                    initImagePreviewLayout();
                }
            });
        }

        initImagePreviewInteractions();

        const MAX_GENERATOR_IMAGE_BYTES = 10 * 1024 * 1024;
        const GENERATOR_IMAGE_MAX_EDGE = 3840;
        const GENERATOR_IMAGE_JPEG_QUALITY = 0.95;
        const SUPPORTED_GENERATOR_IMAGE_TYPES = new Set(['image/jpeg', 'image/png']);

        function getPreparedImageName(file) {
            const baseName = (file.name || 'image').replace(/\.[^.]+$/, '') || 'image';
            return `${baseName}.jpg`;
        }

        function isLikelyImageFile(file) {
            return file.type.startsWith('image/') || /\.(jpe?g|png|webp|bmp|gif|avif)$/i.test(file.name || '');
        }

        function shouldConvertImage(file, width, height) {
            const maxDim = Math.max(width, height);
            return !SUPPORTED_GENERATOR_IMAGE_TYPES.has(file.type) || file.size > MAX_GENERATOR_IMAGE_BYTES || maxDim > GENERATOR_IMAGE_MAX_EDGE;
        }

        async function assignPreparedImage(file, index) {
            try {
                imageFiles[index] = await compressImage(file);
                return true;
            } catch (error) {
                console.error('Image preparation failed:', error);
                showMessage(`图片处理失败：${error.message}`, 'error');
                return false;
            }
        }

        function collectImageFiles(fileList) {
            const files = Array.from(fileList || []);
            const images = files.filter(isLikelyImageFile);
            const skipped = files.length - images.length;
            if (skipped > 0) {
                showMessage(`已忽略 ${skipped} 个非图片文件`, 'warning');
            }
            return images;
        }

        // ==================== 图片压缩 ====================
        async function compressImage(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);

                img.onload = () => {
                    URL.revokeObjectURL(url);

                    let { width, height } = img;
                    const maxDim = Math.max(width, height);

                    if (!shouldConvertImage(file, width, height)) {
                        resolve(file);
                        return;
                    }

                    if (maxDim > GENERATOR_IMAGE_MAX_EDGE) {
                        const scale = GENERATOR_IMAGE_MAX_EDGE / maxDim;
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        if (!blob) {
                            reject(new Error('Compression failed'));
                            return;
                        }
                        if (blob.size > MAX_GENERATOR_IMAGE_BYTES) {
                            reject(new Error('压缩后仍超过 10MB'));
                            return;
                        }
                        const compressedFile = new File([blob], getPreparedImageName(file), {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        });
                        resolve(compressedFile);
                    }, 'image/jpeg', GENERATOR_IMAGE_JPEG_QUALITY);
                };

                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('不支持的图片格式'));
                };

                img.src = url;
            });
        }

        // Initialize Image Grid
        function initImageGrid() {
            renderImageGrid();
        }

        function renderImageGrid() {
            const grid = document.getElementById('imageGrid');
            const countEl = document.getElementById('imageCount');
            grid.innerHTML = '';

            const validImages = imageFiles.filter(f => f !== null);
            const totalReferenceCount = validImages.length;
            const maxReferenceCount = getMaxReferenceCount();
            countEl.textContent = `${validImages.length} / ${maxReferenceCount}`;

            for (let i = 0; i < imageFiles.length; i++) {
                const file = imageFiles[i];
                if (!file) continue;

                const slot = document.createElement('div');
                slot.className = 'image-slot pastable-indicator relative border-2 border-dashed rounded-xl overflow-hidden cursor-pointer group';
                slot.style.borderColor = 'var(--border-input)';
                slot.id = `slot-${i}`;
                slot.ondragover = (e) => handleDragOver(e, i);
                slot.ondragleave = (e) => handleDragLeave(e, i);
                slot.ondrop = (e) => handleDrop(e, i);
                slot.onmouseenter = () => activeSlot = i;
                slot.onmouseleave = () => activeSlot = null;

                const reader = new FileReader();
                reader.onload = ((idx, slotElement) => (e) => {
                    const img = slotElement.querySelector('img');
                    if (img) img.src = e.target.result;
                })(i, slot);
                reader.readAsDataURL(file);

                slot.innerHTML = `
                    <input type="file" id="file-${i}" accept="image/jpeg,image/png,image/webp,image/*" multiple onchange="handleFileSelect(event, ${i})">
                    <div class="absolute inset-0 flex flex-col items-center justify-center hidden" id="placeholder-${i}" style="color: var(--text-muted);">
                        <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        <span class="text-xs">点击或拖拽</span>
                    </div>
                    <img id="preview-${i}" class="absolute inset-0 w-full h-full object-contain" />
                    <span class="img-tag" id="tag-${i}">@img${i + 1}</span>
                    <button onclick="removeImage(event, ${i})" id="remove-${i}" class="absolute top-1 right-1 w-6 h-6 bg-red-500 hover:bg-red-600 rounded-full flex items-center justify-center text-white text-xs z-10 shadow-lg">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                `;
                grid.appendChild(slot);
            }

            if (totalReferenceCount < maxReferenceCount) {
                const addSlot = document.createElement('div');
                addSlot.className = 'image-slot pastable-indicator relative border-2 border-dashed rounded-xl overflow-hidden cursor-pointer group transition-all';
                addSlot.style.borderColor = 'var(--border-input)';
                addSlot.style.background = 'var(--slot-bg)';
                addSlot.ondragover = (e) => { e.preventDefault(); addSlot.classList.add('dragover'); };
                addSlot.ondragleave = (e) => { e.preventDefault(); addSlot.classList.remove('dragover'); };
                addSlot.ondrop = (e) => handleDropOnAddButton(e);
                addSlot.onmouseenter = () => activeSlot = -1;
                addSlot.onmouseleave = () => activeSlot = null;

                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.id = 'file-add-new';
                fileInput.accept = 'image/jpeg,image/png,image/webp,image/*';
                fileInput.multiple = true;
                fileInput.style.display = 'none';
                fileInput.onchange = (e) => handleAddNewImage(e);

                addSlot.onclick = () => fileInput.click();
                addSlot.innerHTML = `
                    <div class="absolute inset-0 flex flex-col items-center justify-center transition-colors" style="color: var(--text-muted);">
                        <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        <span class="text-xs">添加</span>
                    </div>
                `;
                addSlot.appendChild(fileInput);
                grid.appendChild(addSlot);
            }
        }

        async function handleAddNewImage(event) {
            const files = collectImageFiles(event.target.files);
            if (files.length === 0) return;

            const remaining = remainingReferenceSlots();
            if (remaining <= 0) {
                showMessage(`当前模型最多只能上传 ${getMaxReferenceCount()} 张参考图`, 'error');
                event.target.value = '';
                return;
            }

            const filesToAdd = files.slice(0, remaining);
            if (files.length > remaining) {
                showMessage(`仅添加了前${remaining}张图片，已达上限`, 'warning');
            }

            for (const file of filesToAdd) {
                let targetIndex = imageFiles.findIndex(f => f === null);
                if (targetIndex === -1) {
                    targetIndex = imageFiles.length;
                    imageFiles.push(null);
                }
                await assignPreparedImage(file, targetIndex);
            }
            renderImageGrid();
            autoSaveConfig();
            event.target.value = '';
        }

        async function handleDropOnAddButton(e) {
            e.preventDefault();
            e.stopPropagation();

            const files = collectImageFiles(e.dataTransfer.files);
            if (files.length === 0) return;

            const remaining = remainingReferenceSlots();
            if (remaining <= 0) {
                showMessage(`当前模型最多只能上传 ${getMaxReferenceCount()} 张参考图`, 'error');
                return;
            }

            const filesToAdd = files.slice(0, remaining);
            if (files.length > remaining) {
                showMessage(`仅添加了前${remaining}张图片，已达上限`, 'warning');
            }

            for (const file of filesToAdd) {
                let targetIndex = imageFiles.findIndex(f => f === null);
                if (targetIndex === -1) {
                    targetIndex = imageFiles.length;
                    imageFiles.push(null);
                }
                await assignPreparedImage(file, targetIndex);
            }
            renderImageGrid();
            autoSaveConfig();
        }

        // 弹出式 Mention 面板
        function toggleMentionPopup() {
            if (isMentionPopupOpen) {
                closeMentionPopup();
            } else {
                openMentionPopup();
            }
        }

        function openMentionPopup(keyword = '', options = {}) {
            const popup = document.getElementById('mentionPopup');
            const btn = document.getElementById('mentionBtn');
            const list = document.getElementById('mentionPopupList');
            const editor = document.getElementById('prompt');
            const editorScrollTop = editor.scrollTop;

            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }

            popupKeyword = keyword.toLowerCase();
            keyboardSelectedIndex = -1;
            removeMentionTriggerOnCancel = Boolean(options.removeTriggerOnCancel);

            renderMentionList();
            positionPopup();

            popup.classList.add('active');
            btn.classList.add('active');
            isMentionPopupOpen = true;

            focusWithoutScrolling(editor);
            editor.scrollTop = editorScrollTop;
        }

        function focusWithoutScrolling(element) {
            try {
                element.focus({ preventScroll: true });
            } catch (error) {
                element.focus();
            }
        }

        function positionPopup() {
            const popup = document.getElementById('mentionPopup');
            const editor = document.getElementById('prompt');
            const editorRect = editor.getBoundingClientRect();

            const sel = window.getSelection();
            let cursorX = editorRect.left + 20;
            let cursorY = editorRect.top + 50;
            let anchorTop = editorRect.top;

            if (editingChip) {
                const chipRect = editingChip.getBoundingClientRect();
                cursorX = chipRect.left;
                cursorY = chipRect.bottom + 6;
                anchorTop = chipRect.top;
            } else if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const rects = range.getClientRects();
                if (rects.length > 0) {
                    const rect = rects[rects.length - 1];
                    cursorX = rect.left;
                    cursorY = rect.bottom + 5;
                    anchorTop = rect.top;
                }
            }


            const popupWidth = 248;
            const popupHeight = 280;

            if (cursorX + popupWidth > window.innerWidth) {
                cursorX = window.innerWidth - popupWidth - 20;
            }
            if (cursorY + popupHeight > window.innerHeight) {
                cursorY = anchorTop - popupHeight - 6;
            }
            cursorX = Math.max(10, cursorX);
            cursorY = Math.max(10, cursorY);

            popup.style.left = (cursorX - editorRect.left) + 'px';
            popup.style.top = (cursorY - editorRect.top) + 'px';
        }

        function renderMentionList() {
            const list = document.getElementById('mentionPopupList');
            list.innerHTML = '';

            let hasImages = false;
            let visibleCount = 0;

            for (let i = 0; i < imageFiles.length; i++) {
                if (imageFiles[i]) {
                    const tagName = `img${i + 1}`;
                    if (popupKeyword && !tagName.toLowerCase().includes(popupKeyword)) {
                        continue;
                    }

                    hasImages = true;
                    const item = document.createElement('div');
                    item.className = 'mention-popup-item';
                    item.dataset.index = i;
                    item.dataset.visibleIndex = visibleCount;

                    const previewSrc = URL.createObjectURL(imageFiles[i]);
                    item.innerHTML = `
                        <img src="${previewSrc}" alt="img${i + 1}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect fill=%22%231e293b%22 width=%2240%22 height=%2240%22/><text fill=%22%2360a5fa%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>${i + 1}</text></svg>'">
                        <span>@img${i + 1}</span>
                    `;
                    item.onmousedown = (event) => event.preventDefault();
                    item.onclick = () => selectImageForInsert(i);
                    item.onmouseenter = () => {
                        keyboardSelectedIndex = visibleCount;
                        updateKeyboardSelection();
                    };
                    list.appendChild(item);
                    visibleCount++;
                }
            }

            if (!hasImages) {
                list.innerHTML = `
                    <div class="mention-popup-empty">
                        <div class="icon">${getMentionEmptyIcon('image')}</div>
                        <div>请先上传<br>参考图片</div>
                    </div>`;
            } else if (visibleCount === 0) {
                list.innerHTML = `
                    <div class="mention-popup-empty">
                        <div class="icon">${getMentionEmptyIcon('search')}</div>
                        <div>未找到匹配<br>"${popupKeyword}"</div>
                    </div>`;
            }
        }

        function getMentionEmptyIcon(type) {
            if (type === 'search') {
                return `
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35M10.75 18a7.25 7.25 0 110-14.5 7.25 7.25 0 010 14.5z" />
                    </svg>
                `;
            }
            return `
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 7a3 3 0 013-3h10a3 3 0 013 3v10a3 3 0 01-3 3H7a3 3 0 01-3-3V7z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 14l2.4-2.4a1.4 1.4 0 011.98 0L16 15.2M15 10h.01" />
                </svg>
            `;
        }

        function closeMentionPopup() {
            const popup = document.getElementById('mentionPopup');
            const btn = document.getElementById('mentionBtn');

            popup.classList.remove('active');
            btn.classList.remove('active');
            isMentionPopupOpen = false;
            editingChip = null;
            selectedIndex = -1;
            popupKeyword = '';
            keyboardSelectedIndex = -1;
            savedRange = null;
            removeMentionTriggerOnCancel = false;
        }

        function cancelMentionPopup() {
            const shouldRemoveTrigger = removeMentionTriggerOnCancel;
            closeMentionPopup();
            if (shouldRemoveTrigger) {
                removeAtBeforeCursor();
            }
        }

        function isMentionPopupInteractionTarget(target) {
            const popup = document.getElementById('mentionPopup');
            const btn = document.getElementById('mentionBtn');
            return popup?.contains(target) || btn?.contains(target);
        }

        function selectImageForInsert(index) {
            const editor = document.getElementById('prompt');
            const editorScrollTop = editor.scrollTop;

            const chipInner = `@img${index + 1} <svg style="width:12px;height:12px;margin-left:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;

            if (editingChip) {
                editingChip.dataset.index = index;
                editingChip.innerHTML = chipInner;
            } else {
                focusWithoutScrolling(editor);

                const sel = window.getSelection();
                let range = savedRange;

                if (!range && sel.rangeCount > 0) {
                    range = sel.getRangeAt(0);
                }

                if (range) {
                    sel.removeAllRanges();
                    sel.addRange(range);

                    if (popupKeyword !== null || isMentionPopupOpen) {
                        const textNode = range.startContainer;
                        if (textNode.nodeType === Node.TEXT_NODE) {
                            const text = textNode.textContent;
                            const cursorPos = range.startOffset;
                            const beforeCursor = text.substring(0, cursorPos);
                            const atIndex = beforeCursor.lastIndexOf('@');
                            if (atIndex !== -1) {
                                range.setStart(textNode, atIndex);
                                range.setEnd(textNode, cursorPos);
                                range.deleteContents();
                            }
                        }
                    }

                    const chip = document.createElement('span');
                    chip.className = 'mention-chip';
                    chip.contentEditable = 'false';
                    chip.dataset.index = index;
                    chip.setAttribute('onclick', 'editExistingMention(event, this)');
                    chip.innerHTML = chipInner;

                    range.insertNode(chip);

                    const space = document.createTextNode('\u00A0');
                    chip.parentNode.insertBefore(space, chip.nextSibling);

                    range.setStart(space, 1);
                    range.setEnd(space, 1);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }

            savedRange = null;
            closeMentionPopup();
            editor.scrollTop = editorScrollTop;
            requestAnimationFrame(() => {
                editor.scrollTop = editorScrollTop;
            });
            autoSaveConfig();
        }

        function updateKeyboardSelection() {
            const items = document.querySelectorAll('.mention-popup-item');
            items.forEach((item, idx) => {
                if (parseInt(item.dataset.visibleIndex) === keyboardSelectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function setupMentionSystem() {
            const editor = document.getElementById('prompt');
            const mentionBtn = document.getElementById('mentionBtn');
            if (mentionBtn) {
                mentionBtn.addEventListener('mousedown', (e) => e.preventDefault());
            }

            editor.addEventListener('paste', function (e) {
                e.preventDefault();
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });

            editor.addEventListener('keydown', function (e) {
                if (e.key === '@') {
                    setTimeout(() => {
                        openMentionPopup('', { removeTriggerOnCancel: true });
                    }, 10);
                } else if (isMentionPopupOpen) {
                    handlePopupKeydown(e);
                }
            });

            editor.addEventListener('input', function (e) {
                if (isMentionPopupOpen) {
                    handlePopupInput(e);
                }
            });

            document.addEventListener('pointerdown', function (e) {
                if (isMentionPopupOpen && !isMentionPopupInteractionTarget(e.target)) {
                    closeMentionPopup();
                }
            }, true);

            document.addEventListener('wheel', function (e) {
                if (isMentionPopupOpen && !isMentionPopupInteractionTarget(e.target)) {
                    closeMentionPopup();
                }
            }, true);

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && isMentionPopupOpen) {
                    e.preventDefault();
                    e.stopPropagation();
                    cancelMentionPopup();
                }
            }, true);

            window.addEventListener('resize', function () {
                if (isMentionPopupOpen) {
                    positionPopup();
                }
            });
        }

        function handlePopupKeydown(e) {
            const items = document.querySelectorAll('.mention-popup-item');
            const visibleCount = items.length;

            switch (e.key) {
                case 'Escape':
                    e.preventDefault();
                    cancelMentionPopup();
                    break;
                case 'ArrowDown':
                    if (visibleCount === 0) return;
                    e.preventDefault();
                    keyboardSelectedIndex = (keyboardSelectedIndex + 1) % visibleCount;
                    updateKeyboardSelection();
                    break;
                case 'ArrowUp':
                    if (visibleCount === 0) return;
                    e.preventDefault();
                    keyboardSelectedIndex = (keyboardSelectedIndex - 1 + visibleCount) % visibleCount;
                    updateKeyboardSelection();
                    break;
                case 'Enter':
                case 'Tab':
                    if (visibleCount === 0) return;
                    e.preventDefault();
                    if (keyboardSelectedIndex >= 0) {
                        const selectedItem = document.querySelector(`.mention-popup-item[data-visible-index="${keyboardSelectedIndex}"]`);
                        if (selectedItem) {
                            selectImageForInsert(parseInt(selectedItem.dataset.index));
                        }
                    }
                    break;
            }
        }

        function handlePopupInput(e) {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const textNode = range.startContainer;

                if (textNode.nodeType === Node.TEXT_NODE) {
                    const text = textNode.textContent;
                    const cursorPos = range.startOffset;
                    const beforeCursor = text.substring(0, cursorPos);

                    const atIndex = beforeCursor.lastIndexOf('@');
                    if (atIndex !== -1) {
                        const keyword = beforeCursor.substring(atIndex + 1);
                        if (!keyword.includes(' ') && !keyword.includes('\n')) {
                            popupKeyword = keyword;
                            renderMentionList();
                            if (document.querySelectorAll('.mention-popup-item').length > 0) {
                                keyboardSelectedIndex = 0;
                                updateKeyboardSelection();
                            }
                            return;
                        }
                    }
                }
            }
            closeMentionPopup();
        }

        function removeAtBeforeCursor() {
            const editor = document.getElementById('prompt');
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const textNode = range.startContainer;
                if (textNode.nodeType === Node.TEXT_NODE) {
                    const text = textNode.textContent;
                    const cursorPos = range.startOffset;
                    const beforeCursor = text.substring(0, cursorPos);
                    const atIndex = beforeCursor.lastIndexOf('@');
                    if (atIndex !== -1 && atIndex === cursorPos - 1) {
                        range.setStart(textNode, atIndex);
                        range.setEnd(textNode, cursorPos);
                        range.deleteContents();
                    }
                }
            }
        }

        function editExistingMention(event, element) {
            event.preventDefault();
            event.stopPropagation();
            editingChip = element;
            selectedIndex = parseInt(element.dataset.index);
            openMentionPopup();
        }

        function getParsedPromptText() {
            const editor = document.getElementById('prompt');
            let text = '';

            function traverse(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    text += node.textContent.replace(/\u00A0/g, ' ');
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    if (node.classList.contains('mention-chip')) {
                        const idx = parseInt(node.dataset.index) + 1;
                        text += `【image${idx}】`;
                    } else if (node.tagName === 'BR') {
                        text += '\n';
                    } else {
                        for (let child of node.childNodes) {
                            traverse(child);
                        }
                        if ((node.tagName === 'DIV' || node.tagName === 'P') && node.nextSibling) {
                            text += '\n';
                        }
                    }
                }
            }

            traverse(editor);
            return text.replace(/\n{3,}/g, '\n\n').trim();
        }

        async function handleFileSelect(event, index) {
            const files = collectImageFiles(event.target.files);
            if (files.length === 0) return;

            if (files.length === 1) {
                await assignPreparedImage(files[0], index);
            } else {
                const remaining = remainingReferenceSlots(index);
                const filesToAdd = files.slice(0, remaining);
                if (files.length > remaining) {
                    showMessage(`仅添加了前${remaining}张图片，已达上限`, 'warning');
                }
                await assignPreparedImage(filesToAdd[0], index);
                for (let i = 1; i < filesToAdd.length; i++) {
                    let targetIndex = imageFiles.findIndex(f => f === null);
                    if (targetIndex === -1) {
                        targetIndex = imageFiles.length;
                        imageFiles.push(null);
                    }
                    await assignPreparedImage(filesToAdd[i], targetIndex);
                }
            }
            renderImageGrid();
            autoSaveConfig();
            event.target.value = '';
        }

        function handleDragOver(e, index) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById(`slot-${index}`).classList.add('dragover');
        }

        function handleDragLeave(e, index) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById(`slot-${index}`).classList.remove('dragover');
        }

        async function handleDrop(e, index) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById(`slot-${index}`).classList.remove('dragover');

            const files = collectImageFiles(e.dataTransfer.files);
            if (files.length === 0) return;

            const remaining = remainingReferenceSlots(index);

            if (files.length === 1) {
                await assignPreparedImage(files[0], index);
            } else {
                if (remaining <= 0) {
                    showMessage(`当前模型最多只能上传 ${getMaxReferenceCount()} 张参考图`, 'error');
                    return;
                }
                const filesToAdd = files.slice(0, remaining);
                if (files.length > remaining) {
                    showMessage(`仅添加了前${remaining}张图片，已达上限`, 'warning');
                }
                await assignPreparedImage(filesToAdd[0], index);
                for (let i = 1; i < filesToAdd.length; i++) {
                    let targetIndex = imageFiles.findIndex(f => f === null);
                    if (targetIndex === -1) {
                        targetIndex = imageFiles.length;
                        imageFiles.push(null);
                    }
                    await assignPreparedImage(filesToAdd[i], targetIndex);
                }
            }
            renderImageGrid();
            autoSaveConfig();
        }

        async function handleImageFile(file, index) {
            await assignPreparedImage(file, index);
            renderImageGrid();
            autoSaveConfig();
        }

        function removeImage(e, index) {
            e.stopPropagation();
            if (!imageFiles[index]) return;
            imageFiles[index] = null;

            while (imageFiles.length > 0 && imageFiles[imageFiles.length - 1] === null) {
                imageFiles.pop();
            }

            renderImageGrid();
            updatePromptMentionsAfterRemoval(index);

            if (isMentionPopupOpen) {
                renderMentionList();
            }
            autoSaveConfig();
        }

        function updatePromptMentionsAfterRemoval(removedIndex) {
            const editor = document.getElementById('prompt');
            const chips = editor.querySelectorAll('.mention-chip');

            chips.forEach(chip => {
                const chipIndex = parseInt(chip.dataset.index);
                if (chipIndex === removedIndex) {
                    const nextSibling = chip.nextSibling;
                    chip.remove();
                    if (nextSibling && nextSibling.nodeType === Node.TEXT_NODE && nextSibling.textContent === '\u00A0') {
                        nextSibling.remove();
                    }
                } else if (chipIndex > removedIndex) {
                    const newIndex = chipIndex - 1;
                    chip.dataset.index = newIndex;
                    chip.innerHTML = `@img${newIndex + 1} <svg style="width:12px;height:12px;margin-left:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;
                }
            });
        }

        function clearAllImages() {
            if (getReferenceTotalCount() === 0) return;
            imageFiles.length = 0;
            renderImageGrid();
            const editor = document.getElementById('prompt');
            const chips = editor.querySelectorAll('.mention-chip');
            chips.forEach(chip => {
                const nextSibling = chip.nextSibling;
                chip.remove();
                if (nextSibling && nextSibling.nodeType === Node.TEXT_NODE && nextSibling.textContent === '\u00A0') {
                    nextSibling.remove();
                }
            });
            autoSaveConfig();
        }

        function setupPasteListener() {
            document.addEventListener('paste', async (e) => {
                if (document.activeElement.id === 'prompt' || document.activeElement.isContentEditable) return;

                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        if (remainingReferenceSlots() <= 0) {
                            showMessage(`当前模型最多只能上传 ${getMaxReferenceCount()} 张参考图`, 'error');
                            return;
                        }

                        const blob = item.getAsFile();
                        const file = new File([blob], `pasted-image-${Date.now()}.png`, { type: blob.type });

                        let targetIndex;
                        if (activeSlot === -1) {
                            targetIndex = imageFiles.findIndex(f => f === null);
                            if (targetIndex === -1) {
                                targetIndex = imageFiles.length;
                                imageFiles.push(null);
                            }
                        } else if (activeSlot !== null && activeSlot < imageFiles.length && !imageFiles[activeSlot]) {
                            targetIndex = activeSlot;
                        } else {
                            targetIndex = imageFiles.findIndex(f => f === null);
                            if (targetIndex === -1) {
                                targetIndex = imageFiles.length;
                                imageFiles.push(null);
                            }
                        }

                        await assignPreparedImage(file, targetIndex);
                        renderImageGrid();
                        autoSaveConfig();
                        break;
                    }
                }
            });
        }

        // API 配置管理 - RunningHubAI 专用
        function buildConfigPayload() {
            const providerSettings = loadProviderSettingsFromStorage();
            providerSettings[activeProvider] = collectProviderSettings();

            return {
                baseUrl: document.getElementById('baseUrl').value,
                apiKey: document.getElementById('apiKey').value,
                activeProvider,
                providerSettings,
                historyLimit: document.getElementById('historyLimit').value,
                taskHistoryLimit: document.getElementById('taskHistoryLimit').value,
                enableCompression: true,
                maxEdgeLength: GENERATOR_IMAGE_MAX_EDGE,
                jpegQuality: GENERATOR_IMAGE_JPEG_QUALITY,
                maxConcurrency: document.getElementById('maxConcurrency').value,
                pollInterval: document.getElementById('pollInterval').value,
                timestamp: new Date().toISOString()
            };
        }

        function saveConfig() {
            const config = buildConfigPayload();
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
            localStorage.setItem(PROVIDER_SETTINGS_KEY, JSON.stringify(config.providerSettings));
            saveWorkspaceState().catch(console.error);
            showMessage('配置已保存到本地存储', 'success');
        }

        function loadSavedConfig() {
            const saved = localStorage.getItem(CONFIG_KEY);
            let config = null;

            if (saved) {
                try {
                    config = JSON.parse(saved);
                } catch (e) {
                    console.error('Failed to load config:', e);
                }
            }

            document.getElementById('baseUrl').value = normalizeRunningHubBaseUrl(config?.baseUrl);
            document.getElementById('apiKey').value = config?.apiKey || '';
            document.getElementById('historyLimit').value = config?.historyLimit || '20';
            document.getElementById('taskHistoryLimit').value = config?.taskHistoryLimit || '50';
            document.getElementById('enableCompression').checked = true;
            document.getElementById('maxEdgeLength').value = GENERATOR_IMAGE_MAX_EDGE;
            document.getElementById('jpegQuality').value = GENERATOR_IMAGE_JPEG_QUALITY;
            document.getElementById('maxConcurrency').value = config?.maxConcurrency || '3';
            document.getElementById('pollInterval').value = config?.pollInterval || '8';

            const providerSettings = getDefaultProviderSettings();

            if (config?.providerSettings) {
                Object.keys(providerSettings).forEach(key => {
                    Object.assign(providerSettings[key], config.providerSettings[key] || {});
                });
                if (config.providerSettings.nanobanana) {
                    const legacy = config.providerSettings.nanobanana;
                    const targetKey = legacy.modelType === 'pro' ? 'nano-banana-pro' : 'nano-banana2';
                    Object.assign(providerSettings[targetKey], {
                        aspectRatio: legacy.aspectRatio || providerSettings[targetKey].aspectRatio,
                        modelType: 'low-cost',
                        resolution: legacy.resolution || providerSettings[targetKey].resolution
                    });
                }
            }

            // 向后兼容旧配置
            if (!config?.providerSettings && config?.aspectRatio !== undefined) {
                providerSettings['nano-banana2'].aspectRatio = config.aspectRatio;
            }
            if (!config?.providerSettings && config?.resolution !== undefined) {
                providerSettings['nano-banana2'].resolution = config.resolution;
            }
            if (!config?.providerSettings && config?.modelType !== undefined) {
                providerSettings[config.modelType === 'pro' ? 'nano-banana-pro' : 'nano-banana2'].modelType = 'low-cost';
            }

            const finalProvider = resolveProviderId(config?.activeProvider || 'gpt-image-2');
            setActiveProvider(finalProvider, {
                preserveCurrent: false,
                providerSettings
            });
            localStorage.setItem(PROVIDER_SETTINGS_KEY, JSON.stringify(providerSettings));
        }

        function exportConfig() {
            const config = buildConfigPayload();
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rh-reverse-generator-config-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showMessage('配置已导出', 'success');
        }

        function importConfig(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const config = JSON.parse(e.target.result);
                    document.getElementById('baseUrl').value = normalizeRunningHubBaseUrl(config.baseUrl);
                    document.getElementById('apiKey').value = config.apiKey || '';
                    document.getElementById('historyLimit').value = config.historyLimit || '20';
                    document.getElementById('taskHistoryLimit').value = config.taskHistoryLimit || '50';
                    document.getElementById('enableCompression').checked = true;
                    document.getElementById('maxEdgeLength').value = GENERATOR_IMAGE_MAX_EDGE;
                    document.getElementById('jpegQuality').value = GENERATOR_IMAGE_JPEG_QUALITY;
                    document.getElementById('maxConcurrency').value = config.maxConcurrency || '3';
                    document.getElementById('pollInterval').value = config.pollInterval || '8';

                    const providerSettings = getDefaultProviderSettings();
                    if (config.providerSettings) {
                        Object.keys(providerSettings).forEach(key => {
                            Object.assign(providerSettings[key], config.providerSettings[key] || {});
                        });
                        if (config.providerSettings.nanobanana) {
                            const legacy = config.providerSettings.nanobanana;
                            const targetKey = legacy.modelType === 'pro' ? 'nano-banana-pro' : 'nano-banana2';
                            Object.assign(providerSettings[targetKey], {
                                aspectRatio: legacy.aspectRatio || providerSettings[targetKey].aspectRatio,
                                modelType: 'low-cost',
                                resolution: legacy.resolution || providerSettings[targetKey].resolution
                            });
                        }
                    }
                    // 向后兼容
                    if (!config.providerSettings && config.aspectRatio !== undefined) {
                        providerSettings['nano-banana2'].aspectRatio = config.aspectRatio;
                    }
                    if (!config.providerSettings && config.resolution !== undefined) {
                        providerSettings['nano-banana2'].resolution = config.resolution;
                    }
                    if (!config.providerSettings && config.modelType !== undefined) {
                        providerSettings[config.modelType === 'pro' ? 'nano-banana-pro' : 'nano-banana2'].modelType = 'low-cost';
                    }

                    const finalProvider = resolveProviderId(config.activeProvider || 'gpt-image-2');
                    setActiveProvider(finalProvider, {
                        preserveCurrent: false,
                        providerSettings
                    });
                    saveConfig();
                    showMessage('配置已导入并保存', 'success');
                } catch (err) {
                    showMessage('配置文件格式错误', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ==================== 任务队列管理 ====================
        
        // 创建新任务
        function createTask(baseUrl, apiKey, providerId, prompt, params, validImages) {
            taskIdCounter++;
            const localTaskId = `local-${Date.now()}-${taskIdCounter}`;
            const profile = MODEL_PROFILES[providerId] || MODEL_PROFILES['nano-banana2'];
            
            const task = {
                id: localTaskId,
                baseUrl,
                apiKey,
                providerId,
                label: profile.label,
                prompt,
                params,
                images: validImages,
                uploadStrategy: 'base64',
                uploadRecords: [],
                submitSummary: null,
                status: 'pending', // pending, submitting, polling, completed, failed
                serverTaskId: null,
                progress: '0%',
                result: null,
                error: null,
                startTime: Date.now(),
                pollTimer: null,
                pollAttempts: 0,
                timeline: []
            };
            
            recordTaskEvent(task, 'task.queued', '任务已加入本地队列', {
                localFileCount: validImages.filter(f => f !== null).length
            });
            taskQueue.push(task);
            processTaskQueue();
            return localTaskId;
        }

        // 处理任务队列
        async function processTaskQueue() {
            const maxConcurrency = parseInt(document.getElementById('maxConcurrency').value) || 3;
            
            // 如果当前运行任务已达最大并发数，则返回
            if (runningTaskCount >= maxConcurrency) {
                return;
            }
            
            // 获取下一个待处理任务
            const taskIndex = taskQueue.findIndex(t => t.status === 'pending');
            if (taskIndex === -1) {
                return;
            }
            
            const task = taskQueue[taskIndex];
            task.status = 'submitting';
            runningTaskCount++;
            recordTaskEvent(task, 'task.queue.start', '任务开始执行');
            
            try {
                await executeTask(task);
            } catch (error) {
                console.error('Task execution error:', error);
                task.status = 'failed';
                task.error = error.message;
                runningTaskCount--;
                recordTaskEvent(task, 'task.failed', '任务执行链路失败', { error: task.error });
                saveTaskHistory();
                updateTaskUI(task);
                processTaskQueue(); // 尝试处理下一个任务
            }
        }

        function trimTrailingSlash(value) {
            return value.replace(/\/+$/, '');
        }

        function normalizeRunningHubBaseUrl(value) {
            const baseUrl = (value || '').trim();
            if (!baseUrl) {
                return RUNNINGHUB_DEFAULT_BASE_URL;
            }
            return baseUrl;
        }

        function buildApiUrl(baseUrl, path) {
            return `${trimTrailingSlash(baseUrl)}${path}`;
        }

        function toggleApiKeyVisibility() {
            const input = document.getElementById('apiKey');
            const button = document.getElementById('apiKeyToggle');
            const openIcon = document.getElementById('apiKeyEyeOpen');
            const closedIcon = document.getElementById('apiKeyEyeClosed');
            if (!input || !button || !openIcon || !closedIcon) return;
            const shouldShow = input.type === 'password';
            input.type = shouldShow ? 'text' : 'password';
            button.title = shouldShow ? '隐藏 API Key' : '显示 API Key';
            button.setAttribute('aria-label', button.title);
            openIcon.classList.toggle('hidden', shouldShow);
            closedIcon.classList.toggle('hidden', !shouldShow);
        }

        function getApiErrorMessage(data, fallback) {
            if (!data) return fallback;
            if (typeof data.detail === 'string') return data.detail;
            if (Array.isArray(data.detail)) {
                return data.detail.map(item => item.msg || item.message || JSON.stringify(item)).join('; ');
            }
            return data.errorMessage || data.error || data.message || data.msg || fallback;
        }

        async function readJsonResponse(response) {
            const text = await response.text();
            if (!text) return {};
            try {
                return JSON.parse(text);
            } catch (error) {
                return { message: text };
            }
        }

        function getTaskModelFamily(task) {
            const providerId = resolveProviderId(task.providerId);
            const profile = MODEL_PROFILES[providerId] || MODEL_PROFILES['nano-banana2'];
            const channel = task.params?.modelType || 'low-cost';
            return profile.familyKeys?.[channel] || profile.familyKeys?.['low-cost'] || providerId;
        }

        function nowTimeString() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function recordTaskEvent(task, stage, message, extra = {}) {
            if (!task.timeline) task.timeline = [];
            task.timeline.push({
                at: new Date().toISOString(),
                time: nowTimeString(),
                stage,
                message,
                ...extra
            });
            if (task.timeline.length > 80) {
                task.timeline = task.timeline.slice(-80);
            }
            updateTaskUI(task);
        }

        function createReferenceRecord(file, index) {
            return {
                index,
                name: file.name || `reference-${index}`,
                size: file.size,
                type: file.type || '',
                status: 'waiting',
                strategy: 'base64',
                progress: 0,
                startedAt: null,
                updatedAt: nowTimeString(),
                error: null
            };
        }

        function updateReferenceRecord(task, index, patch) {
            if (!task.uploadRecords) task.uploadRecords = [];
            const record = task.uploadRecords.find(item => item.index === index);
            if (!record) return;
            Object.assign(record, patch, { updatedAt: nowTimeString() });
            updateTaskUI(task);
        }

        async function prepareReferenceInputs(task, validImages, payload) {
            task.uploadStrategy = 'base64';
            task.uploadRecords = validImages.map((file, index) => createReferenceRecord(file, index + 1));
            task.submitSummary = {
                base64Count: 0,
                totalFileCount: validImages.length
            };
            recordTaskEvent(task, 'reference.prepare', '准备参考文件：转换为 Base64', task.submitSummary);

            const dataUrls = [];
            for (let i = 0; i < validImages.length; i++) {
                const file = validImages[i];
                const index = i + 1;
                try {
                    updateReferenceRecord(task, index, {
                        status: 'encoding',
                        progress: 0,
                        startedAt: nowTimeString(),
                        detail: '正在转换为 Base64'
                    });
                    const dataUrl = await fileToBase64(file);
                    dataUrls.push(dataUrl);
                    task.submitSummary.base64Count++;
                    updateReferenceRecord(task, index, {
                        status: 'base64-ready',
                        progress: 100,
                        detail: 'Base64 已就绪'
                    });
                    recordTaskEvent(task, 'reference.success', '参考文件已转换为 Base64', { file: file.name });
                } catch (error) {
                    const message = error instanceof Error ? error.message : String(error);
                    updateReferenceRecord(task, index, {
                        status: 'failed',
                        progress: 100,
                        error: message,
                        detail: `Base64 转换失败：${message}`
                    });
                    throw error;
                }
            }

            payload.imageUrls = dataUrls;

            task.submitSummary.totalReferenceCount = task.submitSummary.base64Count;
            recordTaskEvent(task, 'reference.ready', 'Base64 参考文件准备完成', task.submitSummary);
        }

        // 执行单个任务 - 适配 RunningHubAI API
        async function executeTask(task) {
            const taskProvider = resolveProviderId(task.providerId);
            const profile = MODEL_PROFILES[taskProvider] || MODEL_PROFILES['nano-banana2'];
            const validImages = task.images.filter(f => f !== null);
            const isSeedream = taskProvider === 'seedream';
            const modelType = task.params?.modelType || 'low-cost';

            let endpoint = '';
            const action = validImages.length > 0 ? 'image-to-image' : 'text-to-image';
            const isEdit = validImages.length > 0 ? 'edit' : 'text-to-image';

            if (isSeedream) {
                if (modelType === 'seedream4-6') {
                    endpoint = `/openapi/v2/bytedance/jimeng-4.6/${action}`;
                } else if (modelType === 'seedream5-lite') {
                    endpoint = `/openapi/v2/seedream-v5-lite/${action}`;
                } else if (modelType === 'seedream5-pro') {
                    endpoint = `/openapi/v2/seedream-v5-pro/${action}`;
                } else if (modelType === 'seedream4-0') {
                    endpoint = `/openapi/v2/seedream-v4/${action}`;
                } else if (modelType === 'seedream4-5') {
                    endpoint = `/openapi/v2/seedream-v4.5/${action}`;
                }
            } else if (taskProvider === 'nano-banana2') {
                if (modelType === 'low-cost') endpoint = `/openapi/v2/rhart-image-n-g31-flash/${action}`;
                else endpoint = `/openapi/v2/rhart-image-n-g31-flash-official/${action}`;
            } else if (taskProvider === 'nano-banana-pro') {
                if (modelType === 'low-cost') endpoint = `/openapi/v2/rhart-image-n-pro/${isEdit}`;
                else if (modelType === 'official') endpoint = `/openapi/v2/rhart-image-n-pro-official/${isEdit}`;
                else if (modelType === 'ultra') endpoint = `/openapi/v2/rhart-image-n-pro-official/${isEdit}-ultra`;
            } else if (taskProvider === 'gpt-image-2') {
                if (modelType === 'low-cost') endpoint = `/openapi/v2/rhart-image-g-2/${action}`;
                else endpoint = `/openapi/v2/rhart-image-g-2-official/${action}`;
            }

            if (!endpoint) {
                throw new Error(`不支持的模型配置：${taskProvider}/${modelType}`);
            }

            const url = buildApiUrl(task.baseUrl, endpoint);

            const payload = {
                prompt: task.prompt
            };

            recordTaskEvent(task, 'task.submit.start', `开始组装 RunningHub 请求`);

            if (validImages.length > 0) {
                await prepareReferenceInputs(task, validImages, payload);
            }

            if (isSeedream) {
                if (modelType === 'seedream4-6') {
                    payload.scale = 50;
                    payload.forceSingle = false;
                    payload.minRatio = 0.333333;
                    payload.maxRatio = 3;
                }

                if (profile.showResolution && task.params?.resolution) {
                    const res = task.params.resolution;
                    let baseSize = 1024;
                    if (res === '2k') baseSize = 2048;
                    else if (res === '3k') baseSize = 3072;
                    else if (res === '4k') baseSize = 4096;

                    const ratioStr = task.params.aspectRatio || '1:1';
                    const [w, h] = ratioStr.split(':').map(Number);
                    const ratio = Number.isFinite(w / h) && w > 0 && h > 0 ? w / h : 1;

                    const totalPixels = baseSize * baseSize;
                    let calcH = Math.round(Math.sqrt(totalPixels / ratio));
                    let calcW = Math.round(calcH * ratio);

                    let minWidth = modelType === 'seedream5-pro' ? 240 : 512;
                    let maxWidth = 8192;
                    let minHeight = modelType === 'seedream5-pro' ? 240 : 512;
                    let maxHeight = 8192;
                    let dimensionStep = modelType === 'seedream5-pro' || modelType === 'seedream4-6' ? 1 : 8;

                    if (modelType === 'seedream4-6') {
                        minWidth = 900;
                        maxWidth = 6197;
                        minHeight = 768;
                        maxHeight = 4096;
                    } else if (modelType === 'seedream5-lite') {
                        minWidth = 1600;
                        maxWidth = 4704;
                        minHeight = 1344;
                        maxHeight = 4096;
                    }

                    const fitWithinMaximums = () => {
                        if (calcW > maxWidth) {
                            calcW = maxWidth;
                            calcH = Math.round(calcW / ratio);
                        }
                        if (calcH > maxHeight) {
                            calcH = maxHeight;
                            calcW = Math.round(calcH * ratio);
                        }
                    };
                    fitWithinMaximums();
                    if (calcW < minWidth) {
                        calcW = minWidth;
                        calcH = Math.round(calcW / ratio);
                    }
                    if (calcH < minHeight) {
                        calcH = minHeight;
                        calcW = Math.round(calcH * ratio);
                    }
                    fitWithinMaximums();

                    calcW = Math.max(minWidth, Math.min(maxWidth, Math.round(calcW / dimensionStep) * dimensionStep));
                    calcH = Math.max(minHeight, Math.min(maxHeight, Math.round(calcH / dimensionStep) * dimensionStep));

                    payload.width = calcW;
                    payload.height = calcH;
                }

                if (modelType === 'seedream5-pro') {
                    payload.outputFormat = task.params?.outputFormat || 'jpeg';
                }
            } else {
                if (task.params?.aspectRatio) {
                    payload.aspectRatio = task.params.aspectRatio;
                }
                if (profile.showResolution && task.params?.resolution) {
                    payload.resolution = task.params.resolution;
                }
                if (isProfileFeatureEnabled(profile.showQuality, task.params || {}) && task.params?.quality) {
                    payload.quality = task.params.quality;
                }
            }

            recordTaskEvent(task, 'task.submit.request', `正在提交 RunningHub 请求`, {
                url,
                modelFamily: getTaskModelFamily(task)
            });

            const headers = {
                'Authorization': `Bearer ${task.apiKey}`,
                'Content-Type': 'application/json'
            };

            const response = await fetch(url, {
                method: 'POST',
                headers,
                body: JSON.stringify(payload)
            });

            const data = await readJsonResponse(response);

            if (!response.ok) {
                recordTaskEvent(task, 'task.submit.failed', 'RunningHubAI 创建任务失败', { status: response.status, data });
                throw new Error(getApiErrorMessage(data, `HTTP ${response.status}: ${response.statusText}`));
            }

            if (String(data.status || data.data?.status || '').toUpperCase() === 'FAILED' || data.success === false) {
                const message = getApiErrorMessage(data, 'RunningHubAI 创建任务失败');
                recordTaskEvent(task, 'task.submit.failed', 'RunningHubAI 创建任务失败', { status: response.status, data });
                throw new Error(message);
            }

            // V2 官方响应使用顶层 taskId；兼容代理层可能返回的 data.taskId / id。
            const serverTaskId = data.taskId || data.data?.taskId || data.id || data.data?.id;
            if (!serverTaskId) {
                throw new Error('RunningHubAI 响应成功，但未返回 taskId');
            }

            task.serverTaskId = serverTaskId;
            task.result = data;
            task.status = 'polling';
            recordTaskEvent(task, 'task.submit.success', `RunningHubAI 已创建任务，进入轮询`, { serverTaskId });
            updateTaskUI(task);

            // 开始轮询
            startPolling(task);
        }

        // 文件转 Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 开始轮询任务状态 - 适配 RunningHubAI API
        function startPolling(task) {
            const pollInterval = (parseInt(document.getElementById('pollInterval').value) || 8) * 1000;
            const maxAttempts = 120; // 最多轮询120次

            const poll = async () => {
                task.pollAttempts++;

                try {
                    const url = buildApiUrl(task.baseUrl, '/openapi/v2/query');

                    const headers = {
                        'Authorization': `Bearer ${task.apiKey}`,
                        'Content-Type': 'application/json'
                    };

                    const fetchOptions = {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({ taskId: task.serverTaskId })
                    };

                    const response = await fetch(url, fetchOptions);

                    const data = await readJsonResponse(response);

                    if (!response.ok) {
                        throw new Error(getApiErrorMessage(data, `查询任务失败: HTTP ${response.status}`));
                    }

                    let status = data.status || data.data?.status;

                    // Map RunningHub status
                    if (status === 'QUEUED' || status === 'RUNNING') {
                        status = 'processing';
                        task.progress = '50%';
                    } else if (status === 'SUCCESS') {
                        status = 'success';
                        task.progress = '100%';
                    } else if (status === 'FAILED') {
                        status = 'failed';
                        throw new Error(data.errorMessage || data.data?.errorMessage || '任务生成失败');
                    } else {
                        if (data.progress !== undefined) {
                            task.progress = `${Math.round(data.progress * 100)}%`;
                        } else {
                            if (status === 'processing') task.progress = '50%';
                            else if (status === 'completed') task.progress = '100%';
                        }
                    }

                    task.result = data;
                    recordTaskEvent(task, 'task.poll', `轮询第 ${task.pollAttempts} 次：${status}`, {
                        serverTaskId: task.serverTaskId,
                        backendPhase: data.rawRecord?._rhReversePhase || null,
                        backendPhaseStatus: data.rawRecord?._rhReversePhaseStatus || null
                    });

                    if (status === 'success' || status === 'completed') {
                        // 任务完成
                        clearInterval(task.pollTimer);
                        task.status = 'completed';
                        task.result = data;
                        task.progress = '100%';
                        runningTaskCount--;
                        recordTaskEvent(task, 'task.completed', '任务完成，结果已返回');

                        // 显示结果并保存到历史记录
                        displayTaskResult(task);
                        await saveTaskResultToHistory(task);
                        saveTaskHistory();
                        updateTaskUI(task);
                        
                        // 尝试处理下一个任务
                        processTaskQueue();
                        
                    } else if (status === 'failed') {
                        // 任务失败
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = data.error || '任务生成失败';
                        runningTaskCount--;
                        recordTaskEvent(task, 'task.failed', '后端任务失败', { error: task.error });
                        saveTaskHistory();
                        updateTaskUI(task);
                        processTaskQueue(); // 尝试处理下一个任务
                        
                    } else if (status === 'running' || status === 'queued') {
                        // 任务处理中，更新进度
                        task.progress = `${Math.min(Math.round(task.pollAttempts / maxAttempts * 100), 99)}%`;
                        updateTaskUI(task);
                    }

                    if (task.pollAttempts >= maxAttempts) {
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = '任务超时，请稍后在历史记录中查看结果';
                        runningTaskCount--;
                        recordTaskEvent(task, 'task.poll.timeout', '轮询超时');
                        saveTaskHistory();
                        updateTaskUI(task);
                        processTaskQueue(); // 尝试处理下一个任务
                    }
                } catch (error) {
                    clearInterval(task.pollTimer);
                    task.status = 'failed';
                    task.error = error.message;
                    runningTaskCount--;
                    recordTaskEvent(task, 'task.poll.error', '轮询请求失败', { error: task.error });
                    saveTaskHistory();
                    updateTaskUI(task);
                    processTaskQueue();
                    console.error('Poll error:', error);
                }
            };

            // 立即执行一次，然后定期轮询
            poll();
            task.pollTimer = setInterval(poll, pollInterval);
        }

        function imageUrlFromCandidate(candidate) {
            if (!candidate) return null;
            if (typeof candidate === 'string') {
                const value = candidate.trim();
                return value ? value : null;
            }
            const outputType = String(candidate.outputType || candidate.type || '').toLowerCase();
            if (outputType && !/image|png|jpg|jpeg|webp|url|base64/.test(outputType)) return null;

            const inlineData = candidate.inlineData || candidate.inline_data;
            if (inlineData?.data) {
                const mime = inlineData.mimeType || inlineData.mime_type || 'image/png';
                return `data:${mime};base64,${inlineData.data}`;
            }

            const url = candidate.url || candidate.image_url || candidate.imageUrl || candidate.result_url || candidate.output_url || candidate.fileUrl; // Added fileUrl
            if (typeof url === 'string' && url.trim()) return url.trim();
            const outputUrl = candidate.outputUrl || candidate.data?.outputUrl || candidate.response?.outputUrl;
            if (typeof outputUrl === 'string' && outputUrl.trim()) return outputUrl.trim();
            if (Array.isArray(candidate.image_url)) {
                const last = candidate.image_url.filter(item => typeof item === 'string' && item.trim()).at(-1);
                if (last) return last.trim();
            }
            if (Array.isArray(candidate.outputList)) {
                const lastOutput = candidate.outputList
                    .map(item => item?.fileUrl || item?.url)
                    .filter(item => typeof item === 'string' && item.trim())
                    .at(-1);
                if (lastOutput) return lastOutput.trim();
            }
            if (candidate.b64_json) return `data:image/png;base64,${candidate.b64_json}`;
            return null;
        }

        function isDraftImageCandidate(candidate) {
            if (!candidate || typeof candidate !== 'object') return false;
            if (candidate.thought || candidate.draft || candidate.isDraft || candidate.is_draft) return true;
            const marker = `${candidate.outputType || ''} ${candidate.type || ''} ${candidate.name || ''} ${candidate.label || ''}`.toLowerCase();
            return /thought|draft|preview|progress|intermediate|temp|blur/.test(marker);
        }

        function selectFinalImageResult(candidates) {
            const images = candidates
                .map(candidate => ({ url: imageUrlFromCandidate(candidate), draft: isDraftImageCandidate(candidate) }))
                .filter(item => item.url);
            return images.filter(item => !item.draft).at(-1)?.url || images.at(-1)?.url || null;
        }

        function extractImageSource(result) {
            const candidates = [];
            const addItem = item => {
                if (item !== undefined && item !== null) candidates.push(item);
            };
            const addArray = items => {
                if (Array.isArray(items)) items.forEach(addItem);
            };

            // RunningHubAI structure
            addArray(result?.results);
            addArray(result?.data?.results);
            addArray(result?.data);
            addArray(result?.data?.data);
            addArray(result?.response?.data);
            addArray(result?.response?.data?.data);
            addArray(result?.rawRecord?.outputList);

            // Seedream / RunningHub API standard structure (e.g. data.results[] / data.fileUrl)
            if (result?.results && Array.isArray(result.results)) {
                result.results.forEach(r => addItem(r.url || r.fileUrl));
            } else if (result?.data?.results && Array.isArray(result.data.results)) {
                 result.data.results.forEach(r => addItem(r.url || r.fileUrl));
            } else if (result?.data?.fileUrl) {
                 addItem(result.data.fileUrl);
            }

            addItem(result);
            addItem(result?.data);
            addItem(result?.response);
            addItem(result?.rawRecord);

            return selectFinalImageResult(candidates);
        }

        // 显示任务结果
        function displayTaskResult(task) {
            const resultArea = document.getElementById('resultArea');
