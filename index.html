            reader.onload = (e) => {
                try {
                    const config = JSON.parse(e.target.result);
                    document.getElementById('baseUrl').value = config.baseUrl || 'https://www.runninghub.cn';
                    document.getElementById('apiKey').value = config.apiKey || '';
                    document.getElementById('historyLimit').value = config.historyLimit || '20';
                    document.getElementById('taskHistoryLimit').value = config.taskHistoryLimit || '50';
                    document.getElementById('enableCompression').checked = config.enableCompression === true;
                    document.getElementById('maxEdgeLength').value = config.maxEdgeLength || '2560';
                    document.getElementById('jpegQuality').value = config.jpegQuality || '0.9';
                    document.getElementById('maxConcurrency').value = config.maxConcurrency || '3';
                    document.getElementById('pollInterval').value = config.pollInterval || '8';

                    const providerSettings = getDefaultProviderSettings();
                    if (config.providerSettings) {
                        Object.assign(providerSettings.nanobanana, config.providerSettings.nanobanana || {});
                        Object.assign(providerSettings['gpt-image-2'], config.providerSettings['gpt-image-2'] || {});
                    }
                    // 向后兼容
                    if (!config.providerSettings && config.aspectRatio !== undefined) {
                        providerSettings.nanobanana.aspectRatio = config.aspectRatio;
                    }
                    if (!config.providerSettings && config.resolution !== undefined) {
                        providerSettings.nanobanana.resolution = config.resolution;
                    }
                    if (!config.providerSettings && config.modelType !== undefined) {
                        providerSettings.nanobanana.modelType = config.modelType;
                    }

                    setActiveProvider(config.activeProvider || 'nanobanana', {
                        preserveCurrent: false,
                        providerSettings
                    });
                    saveConfig();
                    showMessage('配置已导入并保存', 'success');
                } catch (err) {
                    showMessage('配置文件格式错误', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ==================== 任务队列管理 ====================
        
        // 创建新任务
        function createTask(baseUrl, apiKey, providerId, prompt, params, validImages) {
            taskIdCounter++;
            const localTaskId = `local-${Date.now()}-${taskIdCounter}`;
            const profile = MODEL_PROFILES[providerId] || MODEL_PROFILES.nanobanana;
            
            const task = {
                id: localTaskId,
                baseUrl,
                apiKey,
                providerId,
                label: profile.label,
                prompt,
                params,
                images: validImages,
                status: 'pending', // pending, submitting, polling, completed, failed
                serverTaskId: null,
                progress: '0%',
                result: null,
                error: null,
                startTime: Date.now(),
                pollTimer: null,
                pollAttempts: 0
            };
            
            taskQueue.push(task);
            processTaskQueue();
            return localTaskId;
        }

        // 处理任务队列
        async function processTaskQueue() {
            const maxConcurrency = parseInt(document.getElementById('maxConcurrency').value) || 3;
            
            // 如果当前运行任务已达最大并发数，则返回
            if (runningTaskCount >= maxConcurrency) {
                return;
            }
            
            // 获取下一个待处理任务
            const taskIndex = taskQueue.findIndex(t => t.status === 'pending');
            if (taskIndex === -1) {
                return;
            }
            
            const task = taskQueue[taskIndex];
            task.status = 'submitting';
            runningTaskCount++;
            
            try {
                await executeTask(task);
            } catch (error) {
                console.error('Task execution error:', error);
                task.status = 'failed';
                task.error = error.message;
                runningTaskCount--;
                saveTaskHistory();
                updateTaskUI(task);
                processTaskQueue(); // 尝试处理下一个任务
            }
        }

        // 执行单个任务 - 适配 RunningHub API
        async function executeTask(task) {
            const profile = MODEL_PROFILES[task.providerId] || MODEL_PROFILES.nanobanana;
            
            let url;
            let requestBody;
            
            if (profile.requestType === 'runninghub-gpt') {
                const validImages = task.images.filter(f => f !== null);
                const isImageToImage = validImages.length > 0;
                const endpoint = isImageToImage
                    ? '/openapi/v2/rhart-image-g-2/image-to-image'
                    : '/openapi/v2/rhart-image-g-2/text-to-image';
                url = `${task.baseUrl}${endpoint}`;
                requestBody = { prompt: task.prompt };
                if (task.params?.aspectRatio) requestBody.aspectRatio = task.params.aspectRatio;
                if (task.params?.resolution) requestBody.resolution = task.params.resolution;
                if (isImageToImage) {
                    const imageUrls = [];
                    for (const file of validImages) { imageUrls.push(await fileToBase64(file)); }
                    requestBody.imageUrls = imageUrls;
                }
            } else if (profile.requestType === 'runninghub-gpt-official') {
                const validImages = task.images.filter(f => f !== null);
                const isImageToImage = validImages.length > 0;
                const endpoint = isImageToImage
                    ? '/openapi/v2/rhart-image-g-2-official/image-to-image'
                    : '/openapi/v2/rhart-image-g-2-official/text-to-image';
                url = `${task.baseUrl}${endpoint}`;
                requestBody = { prompt: task.prompt, resolution: task.params?.resolution || '2k', quality: task.params?.quality || 'medium' };
                if (task.params?.aspectRatio) requestBody.aspectRatio = task.params.aspectRatio;
                if (isImageToImage) {
                    const imageUrls = [];
                    for (const file of validImages) { imageUrls.push(await fileToBase64(file)); }
                    requestBody.imageUrls = imageUrls;
                }
            } else if (profile.requestType === 'runninghub-v2-official') {
                const validImages = task.images.filter(f => f !== null);
                const isImageToImage = validImages.length > 0;
                const endpoint = isImageToImage
                    ? '/openapi/v2/rhart-image-n-g31-flash-official/image-to-image'
                    : '/openapi/v2/rhart-image-n-g31-flash-official/text-to-image';
                url = `${task.baseUrl}${endpoint}`;
                requestBody = { prompt: task.prompt, resolution: task.params?.resolution || '1k' };
                if (task.params?.aspectRatio) requestBody.aspectRatio = task.params.aspectRatio;
                if (isImageToImage) {
                    const imageUrls = [];
                    for (const file of validImages) { imageUrls.push(await fileToBase64(file)); }
                    requestBody.imageUrls = imageUrls;
                }
            } else if (profile.requestType === 'runninghub-pro-official') {
                const validImages = task.images.filter(f => f !== null);
                const isImageToImage = validImages.length > 0;
                const endpoint = isImageToImage
                    ? '/openapi/v2/rhart-image-n-pro-official/edit'
                    : '/openapi/v2/rhart-image-n-pro-official/text-to-image';
                url = `${task.baseUrl}${endpoint}`;
                requestBody = { prompt: task.prompt, resolution: task.params?.resolution || '1k' };
                if (task.params?.aspectRatio) requestBody.aspectRatio = task.params.aspectRatio;
                if (isImageToImage) {
                    const imageUrls = [];
                    for (const file of validImages) { imageUrls.push(await fileToBase64(file)); }
                    requestBody.imageUrls = imageUrls;
                }
            } else {
                // NanoBanana 模式
                const validImages = task.images.filter(f => f !== null);
                const isImageToImage = validImages.length > 0;
                const isProModel = task.params?.modelType === 'pro';
                
                let endpoint;
                if (isProModel) {
                    endpoint = isImageToImage 
                        ? '/openapi/v2/rhart-image-n-pro/edit'
                        : '/openapi/v2/rhart-image-n-pro/text-to-image';
                } else {
                    endpoint = isImageToImage 
                        ? '/openapi/v2/rhart-image-n-g31-flash/image-to-image'
                        : '/openapi/v2/rhart-image-n-g31-flash/text-to-image';
                }
                
                url = `${task.baseUrl}${endpoint}`;
                
                requestBody = {
                    prompt: task.prompt,
                    aspectRatio: task.params?.aspectRatio || '9:16',
                    resolution: task.params?.resolution || '2k'
                };
                
                // 图生图需要上传图片
                if (isImageToImage) {
                    const imageUrls = [];
                    for (const file of validImages) {
                        const base64 = await fileToBase64(file);
                        imageUrls.push(base64);
                    }
                    requestBody.imageUrls = imageUrls;
                }
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${task.apiKey}`
                },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.errorMessage || `HTTP ${response.status}: ${response.statusText}`);
            }

            // 获取服务端任务ID并开始轮询
            const serverTaskId = data.taskId;
            if (!serverTaskId) {
                throw new Error('未能获取任务ID');
            }

            task.serverTaskId = serverTaskId;
            task.status = 'polling';
            updateTaskUI(task);

            // 开始轮询
            startPolling(task);
        }

        // 文件转 Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 开始轮询任务状态 - 适配 RunningHub API
        function startPolling(task) {
            const pollInterval = (parseInt(document.getElementById('pollInterval').value) || 8) * 1000;
            const maxAttempts = 120; // 最多轮询120次
            
            const poll = async () => {
                task.pollAttempts++;
                
                try {
                    const response = await fetch(`${task.baseUrl}/openapi/v2/query`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${task.apiKey}`
                        },
                        body: JSON.stringify({
                            taskId: task.serverTaskId
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.errorMessage || `查询任务失败: HTTP ${response.status}`);
                    }

                    const status = data.status;

                    if (status === 'SUCCESS') {
                        // 任务完成
                        clearInterval(task.pollTimer);
                        task.status = 'completed';
                        task.result = data;
                        task.progress = '100%';
                        runningTaskCount--;
                        
                        // 显示结果并保存到历史记录
                        displayTaskResult(task);
                        await saveTaskResultToHistory(task);
                        saveTaskHistory();
                        updateTaskUI(task);
                        
                        // 尝试处理下一个任务
                        processTaskQueue();
                        
                    } else if (status === 'FAILED') {
                        // 任务失败
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = data.errorMessage || data.failedReason?.message || '任务生成失败';
                        runningTaskCount--;
                        saveTaskHistory();
                        updateTaskUI(task);
                        processTaskQueue(); // 尝试处理下一个任务
                        
                    } else if (status === 'RUNNING' || status === 'QUEUED') {
                        // 任务处理中，更新进度
                        task.progress = `${Math.min(Math.round(task.pollAttempts / maxAttempts * 100), 99)}%`;
                        updateTaskUI(task);
                    }

                    if (task.pollAttempts >= maxAttempts) {
                        clearInterval(task.pollTimer);
                        task.status = 'failed';
                        task.error = '任务超时，请稍后在历史记录中查看结果';
                        runningTaskCount--;
                        saveTaskHistory();
                        updateTaskUI(task);
                        processTaskQueue(); // 尝试处理下一个任务
                    }
                } catch (error) {
                    clearInterval(task.pollTimer);
                    task.status = 'failed';
                    task.error = error.message;
                    runningTaskCount--;
                    saveTaskHistory();
                    updateTaskUI(task);
                    processTaskQueue();
                    console.error('Poll error:', error);
                }
            };

            // 立即执行一次，然后定期轮询
            poll();
            task.pollTimer = setInterval(poll, pollInterval);
        }

        // 显示任务结果
        function displayTaskResult(task) {
            const resultArea = document.getElementById('resultArea');
            const resultImage = document.getElementById('resultImage');
            const downloadLink = document.getElementById('downloadLink');
            const jsonResult = document.getElementById('jsonResult');

            resultArea.classList.remove('hidden');

            // RunningHub API 返回的结果结构
            if (task.result && task.result.results && task.result.results.length > 0 && task.result.results[0].url) {
                resultImage.src = task.result.results[0].url;
                downloadLink.href = task.result.results[0].url;
                downloadLink.download = `generated-${Date.now()}.png`;
                if (jsonResult) jsonResult.classList.add('hidden');
            } else {
                showMessage('返回数据格式异常', 'error');
                if (jsonResult) {
                    jsonResult.textContent = JSON.stringify(task.result, null, 2);
                    jsonResult.classList.remove('hidden');
                }
            }

            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 保存任务结果到历史记录
        async function saveTaskResultToHistory(task) {
            try {
                let imageData = null;

                // RunningHub API 返回的结果结构
                if (task.result && task.result.results && task.result.results.length > 0 && task.result.results[0].url) {
                    try {
                        const response = await fetch(task.result.results[0].url);
                        const blob = await response.blob();
                        imageData = await blobToBase64(blob);
                    } catch (e) {
                        console.error('Failed to fetch image from URL:', e);
                        imageData = task.result.results[0].url;
                    }
                }

                if (imageData) {
                    await addHistoryItem(imageData, task.prompt);
                    await loadHistory();
                }
            } catch (error) {
                console.error('Failed to save to history:', error);
            }
        }

        // 当前选中的任务ID
        let selectedTaskId = null;

        // 更新任务UI
        function updateTaskUI(changedTask) {
            const taskContainer = document.getElementById('taskContainer');
            const taskCountEl = document.getElementById('taskCount');
            const taskFloatCountEl = document.getElementById('taskFloatCount');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('btnLoader');
            
            const pendingCount = taskQueue.filter(t => t.status === 'pending').length;
            const runningCount = taskQueue.filter(t => t.status === 'submitting' || t.status === 'polling').length;
            const completedCount = taskQueue.filter(t => t.status === 'completed').length;
            const failedCount = taskQueue.filter(t => t.status === 'failed').length;
            
            // 更新按钮状态
            if (runningCount > 0) {
                btnText.textContent = '生成中...';
                loader.classList.remove('hidden');
            } else if (pendingCount > 0) {
                btnText.textContent = '等待中...';
                loader.classList.remove('hidden');
            } else {
                btnText.textContent = '生成图像';
                loader.classList.add('hidden');
            }
            
            // 更新任务数量
            taskCountEl.textContent = taskQueue.length;
            if (taskFloatCountEl) {
                const activeTaskCount = pendingCount + runningCount;
                taskFloatCountEl.textContent = activeTaskCount;
                taskFloatCountEl.style.display = activeTaskCount > 0 ? 'inline-flex' : 'none';
            }
            
            // 渲染任务列表
            if (taskQueue.length === 0) {
                taskContainer.innerHTML = `
                    <div class="text-center py-8 text-sm" style="color: var(--text-muted);">
                        暂无任务
                    </div>
                `;
            } else {
                taskContainer.innerHTML = taskQueue.slice().reverse().map(task => {
                    const isSelected = task.id === selectedTaskId;
                    const progress = parseInt(task.progress) || 0;
                    const statusText = {
                        'pending': '等待中',
                        'submitting': '提交中',
                        'polling': '生成中',
                        'completed': '已完成',
                        'failed': '失败'
                    }[task.status] || task.status;
                    
                    return `
                        <div class="task-item ${task.status} ${isSelected ? 'selected' : ''}" 
                             onclick="selectTask('${task.id}')">
                            <div class="task-header">
                                <span class="task-id">${task.id.slice(-8)}</span>
                                <span class="task-status ${task.status}">${statusText}</span>
                            </div>
                            <div class="task-progress-text" style="margin-bottom: 6px;">${escapeHtml(task.label || 'NanoBanana')}</div>
                            <div class="task-prompt" title="${escapeHtml(task.prompt)}">${escapeHtml(task.prompt)}</div>
                            ${task.status === 'polling' || task.status === 'submitting' ? `
                                <div class="task-progress-bar">
                                    <div class="task-progress-fill" style="width: ${progress}%"></div>
                                </div>
                                <div class="task-progress-text">${progress}%</div>
                            ` : ''}
                            ${task.status === 'failed' ? `
                                <div class="task-progress-text" style="color: #ef4444;">${escapeHtml(task.error || '未知错误')}</div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            }
            
            // 如果有选中的任务，显示调试信息
            if (selectedTaskId) {
                renderTaskDebugPanel();
            }
            
            // 如果有状态变化，显示消息
            if (changedTask) {
                if (changedTask.status === 'completed') {
                    showMessage(`任务 ${changedTask.id.slice(-4)} 完成`, 'success');
                } else if (changedTask.status === 'failed') {
                    showMessage(`任务 ${changedTask.id.slice(-4)} 失败: ${changedTask.error}`, 'error');
                }
            }
        }

        // 选择任务
        function selectTask(taskId) {
            selectedTaskId = taskId;
            updateTaskUI();
        }

        // 渲染任务调试面板
        function renderTaskDebugPanel() {
            const task = taskQueue.find(t => t.id === selectedTaskId);

            const debugInfo = {
                id: task.id,
                serverTaskId: task.serverTaskId,

        // 关闭任务调试面板
        function closeTaskDebugPanel() {
            selectedTaskId = null;
            const debugPanel = document.getElementById('taskDebugPanel');
            if (debugPanel) {
                debugPanel.remove();
            }
            updateTaskUI();
        }

        // 清理所有任务
        function clearAllTasks() {
            if (taskQueue.length === 0) return;
            
            // 停止所有轮询定时器
            taskQueue.forEach(task => {
                if (task.pollTimer) {
                    clearInterval(task.pollTimer);
                }
            });
            
            taskQueue = [];
            runningTaskCount = 0;
            selectedTaskId = null;
            localStorage.removeItem(TASK_HISTORY_KEY);
            
            const debugPanel = document.getElementById('taskDebugPanel');
            if (debugPanel) {
                debugPanel.remove();
            }
            
            updateTaskUI();
            showMessage('任务列表已清理', 'success');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 图像生成 - 使用任务队列 - 适配 RunningHub API
        async function generateImage() {

            const apiKey = document.getElementById('apiKey').value.trim();

            const validImages = imageFiles.filter(f => f !== null);

            createTask(baseUrl, apiKey, activeProvider, prompt, params, validImages);
            
            showMessage('任务已添加到队列', 'success');
            
            // 更新按钮状态
            updateTaskUI({ status: 'pending' });
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function showMessage(msg, type) {
            const area = document.getElementById('messageArea');
            area.textContent = msg;
            area.classList.remove('hidden');
            area.style.cssText = '';

            if (type === 'error') {

                area.style.border = '1px solid rgba(245, 158, 11, 0.3)';

                area.style.color = '#22c55e';

        function hideMessage() {
            document.getElementById('messageArea').classList.add('hidden');
        }

        // 键盘快捷键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImageModal();
                closeCropHistoryPicker();
            }
        });

        // ==================== 裁图工具 ====================
        let isCropToolOpen = false;
        let cropImage = null; // Image element
        let cropGridCols = 3;
        let cropGridRows = 3;
        let cropPieces = []; // Array of data URLs

        function toggleCropTool() {
            const drawer = document.getElementById('cropToolDrawer');
            const icon = document.getElementById('cropDrawerIcon');
            isCropToolOpen = !isCropToolOpen;
            if (isCropToolOpen) {
                drawer.classList.add('open');
                icon.classList.add('open');
            } else {
                drawer.classList.remove('open');
                icon.classList.remove('open');
            }
        }

        function ensureCropToolOpen() {
            if (!isCropToolOpen) {
                toggleCropTool();
            }
            // 滚动到裁切工具
            setTimeout(() => {
                document.getElementById('cropToolDrawer').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        function handleCropFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            loadFileIntoCropTool(file);
            event.target.value = '';
        }

        function loadFileIntoCropTool(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('请选择图片文件', 'error');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                setCropImage(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // 裁切工具拖拽和粘贴支持
        function initCropDropZone() {
            const dropZone = document.getElementById('cropDropZone');
            if (!dropZone) return;

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.style.borderColor = 'var(--accent-blue)';
                dropZone.style.background = 'rgba(59, 130, 246, 0.1)';
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.style.borderColor = 'var(--border-input)';
                dropZone.style.background = 'var(--slot-bg)';
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.style.borderColor = 'var(--border-input)';
                dropZone.style.background = 'var(--slot-bg)';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    loadFileIntoCropTool(files[0]);
                }
            });

            // Ctrl+V 粘贴支持（整个裁切工具区域）
            const cropDrawer = document.getElementById('cropToolDrawer');
            document.addEventListener('paste', (e) => {
                // 如果焦点在富文本编辑器中则不拦截
                if (document.activeElement.id === 'prompt' || document.activeElement.isContentEditable) return;
                // 裁切工具面板必须展开
                if (!isCropToolOpen) return;

                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        loadFileIntoCropTool(blob);
                        break;
                    }
                }
            });
        }

        // 在页面加载时初始化拖拽区
        document.addEventListener('DOMContentLoaded', initCropDropZone);

        function setCropImage(src) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                cropImage = img;
                renderCropPreview();
                document.getElementById('cropPreviewArea').classList.remove('hidden');
                document.getElementById('cropResultArea').classList.add('hidden');
                cropPieces = [];
                ensureCropToolOpen();
            };
            img.onerror = () => {
                showMessage('裁切工具：图片加载失败', 'error');
            };
            img.src = src;
        }

        function setCropGrid(cols, rows) {
            cropGridCols = cols;
            cropGridRows = rows;

            // 更新按钮状态
            document.querySelectorAll('#cropGridOptions .grid-option-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (cropImage) {
                renderCropPreview();
                // 如果之前已切割过，清空结果
                document.getElementById('cropResultArea').classList.add('hidden');
                cropPieces = [];
            }
        }

        function renderCropPreview() {
            if (!cropImage) return;

            const canvas = document.getElementById('cropCanvas');
            const ctx = canvas.getContext('2d');

            // 限制预览尺寸
            const maxW = 600;
            const maxH = 500;
            let w = cropImage.naturalWidth;
            let h = cropImage.naturalHeight;
            const scale = Math.min(maxW / w, maxH / h, 1);
            w = Math.round(w * scale);
            h = Math.round(h * scale);

            canvas.width = w;
            canvas.height = h;

            // 绘制图片
            ctx.drawImage(cropImage, 0, 0, w, h);

            // 绘制网格线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 6]);

            // 垂直线
            for (let i = 1; i < cropGridCols; i++) {
                const x = Math.round(w * i / cropGridCols);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }

            // 水平线
            for (let j = 1; j < cropGridRows; j++) {
                const y = Math.round(h * j / cropGridRows);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            // 阴影描边让线条更清晰
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([8, 6]);
            ctx.lineDashOffset = 4;

            for (let i = 1; i < cropGridCols; i++) {
                const x = Math.round(w * i / cropGridCols);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }

            for (let j = 1; j < cropGridRows; j++) {
                const y = Math.round(h * j / cropGridRows);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            ctx.setLineDash([]);
            ctx.lineDashOffset = 0;
        }

        function executeCrop() {
            if (!cropImage) {
                showMessage('请先选择一张图片', 'error');
                return;
            }

            const w = cropImage.naturalWidth;
            const h = cropImage.naturalHeight;
            const pieceW = Math.floor(w / cropGridCols);
            const pieceH = Math.floor(h / cropGridRows);

            cropPieces = [];
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');

            for (let row = 0; row < cropGridRows; row++) {
                for (let col = 0; col < cropGridCols; col++) {
                    const sx = col * pieceW;
                    const sy = row * pieceH;
                    // 最后一列/行取到边缘
                    const sw = (col === cropGridCols - 1) ? (w - sx) : pieceW;
                    const sh = (row === cropGridRows - 1) ? (h - sy) : pieceH;

                    tempCanvas.width = sw;
                    tempCanvas.height = sh;
                    tempCtx.drawImage(cropImage, sx, sy, sw, sh, 0, 0, sw, sh);

                    cropPieces.push({
                        dataUrl: tempCanvas.toDataURL('image/png'),
                        label: `${row + 1}-${col + 1}`,
                        row, col
                    });
                }
            }

            renderCropResults();
        }

        function renderCropResults() {
            const resultArea = document.getElementById('cropResultArea');
            const grid = document.getElementById('cropResultGrid');
            resultArea.classList.remove('hidden');

            grid.style.gridTemplateColumns = `repeat(${cropGridCols}, 1fr)`;
            grid.innerHTML = cropPieces.map((piece, idx) => `
                <div class="crop-piece">
                    <img src="${piece.dataUrl}" alt="切片 ${piece.label}">
                    <span class="crop-piece-label">${piece.label}</span>
                    <div class="crop-piece-overlay">
                        <button class="crop-piece-btn" onclick="openImageModal('${piece.dataUrl}')" title="放大预览">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/></svg>
                        </button>
                        <button class="crop-piece-btn" onclick="downloadCropPiece(${idx})" title="下载此切片">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');

            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function downloadCropPiece(index) {
            const piece = cropPieces[index];
            if (!piece) return;
            const link = document.createElement('a');
            link.href = piece.dataUrl;
            link.download = `crop-${piece.label}-${Date.now()}.png`;
            link.click();
        }

        async function downloadAllCropPieces() {
            if (cropPieces.length === 0) {
                showMessage('没有可下载的切片', 'error');
                return;
            }

            if (typeof JSZip === 'undefined') {
                showMessage('JSZip 库尚未加载，请稍后再试', 'error');
                return;
            }

            try {
                const zip = new JSZip();
                const folder = zip.folder('crop-pieces');

                cropPieces.forEach((piece, idx) => {
                    // 从 data URL 提取 base64 数据
                    const base64Data = piece.dataUrl.split(',')[1];
                    folder.file(`crop-${piece.label}.png`, base64Data, { base64: true });
                });

                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `crop-${cropGridRows}x${cropGridCols}-${Date.now()}.zip`;
                link.click();
                URL.revokeObjectURL(url);

                showMessage(`已打包 ${cropPieces.length} 张切片`, 'success');
            } catch (error) {
                console.error('ZIP download failed:', error);
                showMessage('打包下载失败: ' + error.message, 'error');
            }
        }

        // 从结果图发送到裁切工具
        function sendResultToCrop() {
            const resultImage = document.getElementById('resultImage');
            if (!resultImage || !resultImage.src || resultImage.src === window.location.href) {
                showMessage('暂无结果图片可裁切', 'error');
                return;
            }
            setCropImage(resultImage.src);
        }

        // 从历史记录发送到裁切工具
        async function sendHistoryToCrop(id) {
            try {
                const history = await getAllHistory();
                const item = history.find(h => h.id === id);
                if (item && item.imageData) {
                    setCropImage(item.imageData);
                } else {
                    showMessage('未找到历史图片', 'error');
                }
            } catch (error) {
                console.error('Failed to load history image for crop:', error);
                showMessage('加载历史图片失败', 'error');
            }
        }

        // 弹窗选择历史图片
        async function openHistoryPickerForCrop() {
            try {
                const history = await getAllHistory();
                const picker = document.getElementById('cropHistoryPicker');
                const grid = document.getElementById('cropHistoryPickerGrid');

                if (history.length === 0) {
                    grid.innerHTML = '<div class="text-center py-8 text-sm" style="color: var(--text-muted); grid-column: 1 / -1;">暂无历史记录</div>';
                } else {
                    grid.innerHTML = history.map(item => `
                        <div class="crop-history-picker-item" onclick="pickHistoryForCrop('${item.imageData.substring(0, 50)}', ${item.id})">
                            <img src="${item.imageData}" alt="History" loading="lazy">
                        </div>
                    `).join('');
                }

                picker.classList.add('active');
                document.body.style.overflow = 'hidden';
            } catch (error) {
                console.error('Failed to open history picker:', error);
                showMessage('加载历史记录失败', 'error');
            }
        }

        async function pickHistoryForCrop(_, id) {
            closeCropHistoryPicker();
            await sendHistoryToCrop(id);
        }

        function closeCropHistoryPicker(event) {
            const picker = document.getElementById('cropHistoryPicker');
            picker.classList.remove('active');
            document.body.style.overflow = '';
        }
    </script>
</body>

</html>
