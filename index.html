<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunningHub AI 图像生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 夜间模式（默认） */
            --bg-primary: #0f172a;
            --bg-secondary: rgba(30, 41, 59, 0.7);
            --bg-input: rgba(30, 41, 59, 0.5);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-input: #475569;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --slot-bg: rgba(30, 41, 59, 0.3);
            --slot-hover: rgba(30, 41, 59, 0.5);
            --chip-bg: rgba(37, 99, 235, 0.2);
            --chip-border: rgba(59, 130, 246, 0.4);
            --chip-text: #93c5fd;
            --btn-secondary: #334155;
            --btn-secondary-hover: #475569;
        }

        [data-theme="light"] {
            /* 日间模式 - 白绿配色 */
            --bg-primary: #f0fdf4;
            --bg-secondary: rgba(255, 255, 255, 0.9);
            --bg-input: rgba(255, 255, 255, 0.8);
            --text-primary: #1a1a1a;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --border-color: rgba(34, 197, 94, 0.2);
            --border-input: #86efac;
            --accent-blue: #16a34a;
            --accent-purple: #22c55e;
            --accent-green: #15803d;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --slot-bg: rgba(220, 252, 231, 0.5);
            --slot-hover: rgba(187, 247, 208, 0.7);
            --chip-bg: rgba(34, 197, 94, 0.15);
            --chip-border: rgba(34, 197, 94, 0.4);
            --chip-text: #15803d;
            --btn-secondary: #dcfce7;
            --btn-secondary-hover: #bbf7d0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .prompt-panel {
            position: relative;
            z-index: 50;
        }

        .image-slot {
            transition: all 0.3s ease;
            aspect-ratio: 1;
            background: var(--slot-bg);
        }

        .image-slot:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3);
        }

        [data-theme="light"] .image-slot:hover {
            box-shadow: 0 10px 25px -5px rgba(22, 163, 74, 0.3);
        }

        .image-slot.active {
            border-color: var(--accent-green);
            background: rgba(16, 185, 129, 0.1);
        }

        .image-slot.dragover {
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.2);
        }

        [data-theme="light"] .image-slot.dragover {
            background: rgba(34, 197, 94, 0.2);
        }

        .img-tag {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: var(--accent-blue);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-blue);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .pastable-indicator {
            position: relative;
        }

        .pastable-indicator::after {
            content: 'Ctrl+V';
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 9px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            color: #94a3b8;
        }

        [data-theme="light"] .pastable-indicator::after {
            color: #15803d;
            background: rgba(255, 255, 255, 0.8);
        }

        .pastable-indicator:hover::after {
            opacity: 1;
        }

        input[type="file"] {
            display: none;
        }

        .model-tabs {
            display: inline-flex;
            gap: 8px;
            padding: 4px;
            border-radius: 9999px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }

        .model-tab {
            border: none;
            border-radius: 9999px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .model-tab:hover {
            color: var(--text-primary);
            background: rgba(148, 163, 184, 0.12);
        }

        .model-tab.active {
            color: white;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            box-shadow: 0 8px 18px -10px rgba(59, 130, 246, 0.75);
        }

        .hidden-param {
            display: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(128, 128, 128, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(128, 128, 128, 0.5);
        }

        /* 富文本编辑器样式 */
        .prompt-editor {
            height: 180px;
            min-height: 120px;
            overflow-y: auto;
            resize: vertical;
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg-input);
            border-color: var(--border-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .prompt-editor:empty::before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* 交互式引用标签 (Chip) */
        .mention-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--chip-bg);
            color: var(--chip-text);
            border: 1px solid var(--chip-border);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            vertical-align: middle;
            margin: 0 2px;
            transition: all 0.2s;
        }

        .mention-chip:hover {
            filter: brightness(1.2);
        }

        /* 弹出式引用选择面板 */
        .mention-popup {
            position: absolute;
            width: 220px;
            max-height: 280px;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-blue);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.2s ease;
        }

        .mention-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .mention-popup-header {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-input);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mention-popup-header .hint {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .mention-popup-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .mention-popup-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.15s;
            border: 2px solid transparent;
        }

        .mention-popup-item:hover,
        .mention-popup-item.selected {
            background: var(--chip-bg);
            border-color: var(--accent-blue);
        }

        .mention-popup-item.selected {
            filter: brightness(1.1);
        }

        .mention-popup-item img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            display: block;
            background: var(--slot-bg);
        }

        .mention-popup-item span {
            font-size: 13px;
            color: var(--accent-blue);
            font-family: monospace;
            font-weight: 600;
        }

        .mention-popup-empty {
            padding: 24px 16px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .mention-popup-empty .icon {
            font-size: 24px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .textarea-wrapper {
            position: relative;
        }

        :root {
            --global-task-sidebar-width: 360px;
            --global-task-sidebar-gap: 16px;
        }

        .app-main {
            margin-right: 0;
        }

        .task-sidebar {
            position: fixed;
            top: 16px;
            right: 16px;
            bottom: 16px;
            width: var(--global-task-sidebar-width);
            min-width: 280px;
            z-index: 90;
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease, min-width 0.2s ease, padding 0.2s ease;
        }

        .task-sidebar.collapsed {
            display: none;
        }

        .task-sidebar-resizer {
            position: absolute;
            top: 12px;
            bottom: 12px;
            left: -8px;
            width: 12px;
            cursor: col-resize;
            z-index: 20;
        }

        .task-sidebar-resizer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 5px;
            width: 2px;
            height: 48px;
            transform: translateY(-50%);
            border-radius: 9999px;
            background: var(--border-color);
            transition: background 0.2s ease;
        }

        .task-sidebar-resizer:hover::after,
        body.resizing-task-sidebar .task-sidebar-resizer::after {
            background: var(--accent-blue);
        }

        .task-sidebar-toggle {
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .task-sidebar-toggle:hover {
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        .task-float-btn {
            position: fixed;
            right: 20px;
            bottom: 24px;
            width: 54px;
            height: 54px;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            box-shadow: 0 14px 30px -12px rgba(59, 130, 246, 0.8);
            z-index: 95;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .task-float-btn:hover {
            filter: brightness(1.08);
            transform: translateY(-2px);
        }

        body.task-sidebar-collapsed .task-float-btn {
            display: inline-flex;
        }

        .task-float-count {
            position: absolute;
            top: -6px;
            right: -6px;
            min-width: 20px;
            height: 20px;
            padding: 0 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
        }

        @media (max-width: 1023px) {
            .task-sidebar {
                top: auto;
                left: 16px;
                right: 16px;
                bottom: 16px;
                width: auto;
                min-width: 0;
                max-height: 55vh;
            }

            .task-sidebar.collapsed {
                display: none;
            }

            .task-sidebar-resizer {
                display: none;
            }
        }

        .mention-btn {
            position: absolute;
            right: 12px;
            top: 8px;
            background: var(--btn-secondary);
            border: 1px solid var(--border-input);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
            font-weight: 600;
        }

        .mention-btn:hover,
        .mention-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        /* 设置抽屉样式 */
        .settings-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease;
            opacity: 0;
        }

        .settings-drawer.open {
            max-height: 800px;
            opacity: 1;
        }

        .drawer-toggle {
            transition: transform 0.3s ease;
        }

        .drawer-toggle.open {
            transform: rotate(180deg);
        }

        /* 历史记录样式 */
        .history-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px;
            scroll-behavior: smooth;
        }

        .history-item {
            position: relative;
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .history-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .history-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .history-item:hover .history-overlay {
            opacity: 1;
        }

        .history-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
        }

        .history-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .history-time {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(0, 0, 0, 0.6);
            padding: 1px 3px;
            border-radius: 3px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 图片预览模态框 */
        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .image-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .image-modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 结果图预览限制高度 */
        .result-preview-container {
            max-height: 70vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-preview-container img {
            max-height: 70vh;
            width: auto;
            object-fit: contain;
        }

        /* 结果图预览放大镜按钮 */
        .result-zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
        }

        .result-zoom-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.1);
        }

        /* 任务列表样式 */
        .task-list-container {
            max-height: 520px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-sidebar .task-list-container {
            flex: 1;
            max-height: none;
            min-height: 0;
        }

        .task-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--slot-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            background: var(--slot-hover);
            border-color: var(--accent-blue);
        }

        .task-item.selected {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.15);
        }

        .task-item.pending {
            border-left: 3px solid var(--text-muted);
        }

        .task-item.submitting {
            border-left: 3px solid var(--accent-purple);
        }

        .task-item.polling {
            border-left: 3px solid var(--accent-blue);
        }

        .task-item.completed {
            border-left: 3px solid var(--accent-green);
        }

        .task-item.failed {
            border-left: 3px solid #ef4444;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .task-id {
            font-family: monospace;
            font-size: 11px;
            color: var(--text-muted);
        }

        .task-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .task-status.pending {
            background: var(--text-muted);
            color: white;
        }

        .task-status.submitting {
            background: var(--accent-purple);
            color: white;
        }

        .task-status.polling {
            background: var(--accent-blue);
            color: white;
        }

        .task-status.completed {
            background: var(--accent-green);
            color: white;
        }

        .task-status.failed {
            background: #ef4444;
            color: white;
        }

        .task-prompt {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
        }

        .task-progress-bar {
            height: 4px;
            background: var(--bg-input);
            border-radius: 2px;
            overflow: hidden;
        }

        .task-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .task-progress-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            text-align: right;
        }

        /* 任务调试信息面板 */
        .task-debug-panel {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }

        .task-debug-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-debug-content {
            font-family: monospace;
            font-size: 11px;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        /* 输入框统一样式 */
        .form-input {
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        [data-theme="light"] .form-input:focus {
            box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.2);
        }

        /* 下拉框样式 */
        .form-select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
        }

        [data-theme="light"] .form-select option {
            background-color: #f0fdf4;
            color: #166534;
        }

        /* 主题切换按钮 */
        .theme-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-input);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .theme-btn:hover {
            background: var(--btn-secondary-hover);
        }

        .theme-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        /* 单选框样式 */
        input[type="radio"] {
            accent-color: var(--accent-blue);
        }

        /* 开关样式 */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--btn-secondary);
            transition: .3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.toggle-slider {
            background-color: var(--accent-blue);
        }

        input:checked+.toggle-slider:before {
            transform: translateX(20px);
        }

        /* 裁图工具样式 */
        .crop-tool-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.3s ease;
            opacity: 0;
        }

        .crop-tool-drawer.open {
            max-height: 2000px;
            opacity: 1;
        }

        .grid-option-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-input);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 500;
        }

        .grid-option-btn:hover {
            background: var(--btn-secondary-hover);
        }

        .grid-option-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .crop-preview-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-input);
        }

        .crop-preview-wrapper canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .crop-result-grid {
            display: grid;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 4px;
        }

        .crop-piece {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--slot-bg);
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: auto;
        }

        .crop-piece:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--accent-blue);
        }

        .crop-piece img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .crop-piece-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .crop-piece:hover .crop-piece-overlay {
            opacity: 1;
        }

        .crop-piece-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .crop-piece-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.1);
        }

        .crop-piece-label {
            position: absolute;
            top: 4px;
            left: 4px;
            background: var(--accent-blue);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: monospace;
            pointer-events: none;
            z-index: 5;
        }

        .crop-history-picker {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .crop-history-picker.active {
            opacity: 1;
            visibility: visible;
        }

        .crop-history-picker-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }

        .crop-history-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .crop-history-picker-item {
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .crop-history-picker-item:hover {
            border-color: var(--accent-blue);
            transform: scale(1.05);
        }

        .crop-history-picker-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

        function saveTaskHistory() {
            const maxTaskHistory = getTaskHistoryLimit();
            const completedTasks = taskQueue
                .filter(t => t.status === 'completed' || t.status === 'failed')
                .sort((a, b) => (b.startTime || 0) - (a.startTime || 0))
                .map(t => ({
                    id: t.id,
                    providerId: t.providerId,
                    label: t.label,
                    prompt: t.prompt,
                    status: t.status,
                    progress: t.progress,
                    error: t.error,
                    startTime: t.startTime
                }));
            const saved = JSON.parse(localStorage.getItem(TASK_HISTORY_KEY) || '[]');
            const merged = [...completedTasks, ...saved.filter(s => !completedTasks.find(c => c.id === s.id))];
            const trimmed = merged.slice(0, maxTaskHistory);
            localStorage.setItem(TASK_HISTORY_KEY, JSON.stringify(trimmed));
        }

        function initTaskSidebar() {
            const sidebar = document.getElementById('taskSidebar');
            const resizer = document.getElementById('taskSidebarResizer');
            if (!sidebar || !resizer) return;

            const savedWidth = parseInt(localStorage.getItem(TASK_SIDEBAR_WIDTH_KEY), 10);
            if (Number.isFinite(savedWidth)) {
                setTaskSidebarWidth(savedWidth);
            }

            const savedCollapsed = localStorage.getItem(TASK_SIDEBAR_COLLAPSED_KEY);
            if (savedCollapsed === 'false') {
                sidebar.classList.remove('collapsed');
                document.body.classList.remove('task-sidebar-collapsed');
            } else {
                sidebar.classList.add('collapsed');
                document.body.classList.add('task-sidebar-collapsed');
            }

            let startX = 0;
            let startWidth = 0;

            resizer.addEventListener('pointerdown', (e) => {
                if (sidebar.classList.contains('collapsed')) return;
                e.preventDefault();
                startX = e.clientX;
                startWidth = sidebar.getBoundingClientRect().width;
                document.body.classList.add('resizing-task-sidebar');
                resizer.setPointerCapture(e.pointerId);
            });

            resizer.addEventListener('pointermove', (e) => {
                if (!document.body.classList.contains('resizing-task-sidebar')) return;
                const nextWidth = startWidth + (startX - e.clientX);
                setTaskSidebarWidth(nextWidth);
            });

            const stopResize = (e) => {
                if (!document.body.classList.contains('resizing-task-sidebar')) return;
                document.body.classList.remove('resizing-task-sidebar');
                localStorage.setItem(TASK_SIDEBAR_WIDTH_KEY, String(Math.round(sidebar.getBoundingClientRect().width)));
                if (e.pointerId !== undefined && resizer.hasPointerCapture(e.pointerId)) {
                    resizer.releasePointerCapture(e.pointerId);
                }
            };

            resizer.addEventListener('pointerup', stopResize);
            resizer.addEventListener('pointercancel', stopResize);
        }

        function setTaskSidebarWidth(width) {

        async function saveWorkspaceState() {
            const promptText = getParsedPromptText();

            const imageDataList = [];
            for (let i = 0; i < imageFiles.length; i++) {
                if (imageFiles[i]) {
                    try {
                        const dataUrl = await fileToBase64(imageFiles[i]);
                        imageDataList.push({
                            index: i,
                            dataUrl: dataUrl,
                            name: imageFiles[i].name || `image${i + 1}.png`,
                            type: imageFiles[i].type || 'image/png'
                        });
                    } catch (e) {
                        console.error('Failed to serialize image:', e);
                    }
                }
            }

            const workspace = {
                id: 'current',
                prompt: promptText,
                images: imageDataList,
                timestamp: Date.now()
            };
            await saveWorkspaceRecord(workspace);
        }

        async function loadWorkspaceState() {
            let workspace = await getWorkspaceRecord();

            if (!workspace) {
                const saved = localStorage.getItem('runningHubWorkspace');
                if (!saved) return;

                try {
                    workspace = JSON.parse(saved);
                } catch (e) {
                    console.error('Failed to parse legacy workspace:', e);
                    return;
                }
            }

            try {
                // 恢复提示词
                const promptEditor = document.getElementById('prompt');
                promptEditor.innerHTML = parsePromptWithMentions(workspace.prompt || '');

                // 恢复参考图片
                imageFiles.length = 0;
                if (workspace.images && workspace.images.length > 0) {
                    for (const img of workspace.images) {
                        try {
                            const file = await dataURLToFile(img.dataUrl, img.name);
                            imageFiles[img.index] = file;
                        } catch (err) {
                            console.error(`Failed to restore image at index ${img.index}:`, err);
                        }
                    }
                }
                renderImageGrid();
            } catch (e) {
                console.error('Failed to load workspace:', e);
            }
        }

            if (!selectEl) return;
            selectEl.innerHTML = options.map(option =>

            selectEl.value = selectedValue;

        function collectProviderSettings() {
            const profile = getActiveProfile();
            const settings = {

                settings.modelType = document.getElementById('modelType').value;

            if (profile.showResolution) {

            }
            if (profile.showQuality) {
                settings.quality = document.getElementById('quality').value;
            }
            return settings;

        function applyProviderSettings(providerId, settings = {}) {
            const profile = MODEL_PROFILES[providerId] || MODEL_PROFILES.nanobanana;

            document.getElementById('aspectRatioLabel').textContent = profile.aspectRatioLabel;
            let aspectOptions = (typeof profile.aspectRatioOptions === 'function')
                ? profile.aspectRatioOptions()
                : profile.aspectRatioOptions;
            if (profile.aspectRatioOptions4k && settings.resolution === '4k') {
                aspectOptions = profile.aspectRatioOptions4k;
            }
            const currentAspectRatio = settings.aspectRatio || aspectOptions[0]?.value;
            const safeAspectRatio = aspectOptions.find(o => o.value === currentAspectRatio) ? currentAspectRatio : aspectOptions[0]?.value;
            buildSelectOptions(document.getElementById('aspectRatio'), aspectOptions, safeAspectRatio);

            if (profile.showModelType) {
                document.getElementById('modelTypeGroup').classList.remove('hidden-param');
                if (settings.modelType) {
                    document.getElementById('modelType').value = settings.modelType;
                }
            } else {
                document.getElementById('modelTypeGroup').classList.add('hidden-param');
            }

            if (profile.showResolution) {
                document.getElementById('resolutionGroup').classList.remove('hidden-param');
                document.getElementById('resolutionLabel').textContent = '分辨率';
                buildSelectOptions(document.getElementById('resolution'), profile.resolutionOptions, settings.resolution || '');
            } else {
                document.getElementById('resolutionGroup').classList.add('hidden-param');
            }

            const qualityGroup = document.getElementById('qualityGroup');
            if (profile.showQuality) {
                qualityGroup.style.display = '';
                buildSelectOptions(document.getElementById('quality'), profile.qualityOptions, settings.quality || 'medium');
            } else {
                qualityGroup.style.display = 'none';
            }

            const promptEditor = document.getElementById('prompt');
            if (promptEditor) {
                promptEditor.dataset.placeholder = profile.promptPlaceholder;
            }

            Object.values(MODEL_PROFILES).forEach(item => {
                const button = document.getElementById(item.tabId);
                if (!button) return;
                const isActive = item.id === providerId;
                button.classList.toggle('active', isActive);
                button.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });

            const paramGrid = document.getElementById('paramGrid');
            if (paramGrid) {
                const visibleCount = [profile.showModelType, true, profile.showResolution, profile.showQuality].filter(Boolean).length;
                paramGrid.style.gridTemplateColumns = `repeat(${visibleCount}, minmax(0, 1fr))`;
            }

            updatePriceDisplay();
        }

        function setActiveProvider(providerId, options = {}) {
            if (!MODEL_PROFILES[providerId]) return;

            const shouldPreserveCurrent = options.preserveCurrent !== false;
            const providerSettings = options.providerSettings || loadProviderSettingsFromStorage();

            if (shouldPreserveCurrent && MODEL_PROFILES[activeProvider]) {
                providerSettings[activeProvider] = collectProviderSettings();
            }

            activeProvider = providerId;
            localStorage.setItem('runningHubActiveProvider', providerId);
            localStorage.setItem('runningHubProviderSettings', JSON.stringify(providerSettings));
            const nextSettings = providerSettings[providerId] || {};
            applyProviderSettings(providerId, nextSettings);

        function initTheme() {
            const savedTheme = localStorage.getItem('runningHubTheme') || 'dark';
            setTheme(savedTheme, false);

            // 监听系统主题变化
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (currentTheme === 'auto') {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            }
        }

        function setTheme(theme, save = true) {
            currentTheme = theme;

            // 更新按钮状态
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`theme-${theme}`)?.classList.add('active');

            if (save) {
                localStorage.setItem('runningHubTheme', theme);
            }

            if (theme === 'auto') {
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

        // ==================== IndexedDB 操作 ====================
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        const store = database.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                    }
                    if (!database.objectStoreNames.contains(WORKSPACE_STORE_NAME)) {
                        database.createObjectStore(WORKSPACE_STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        function saveWorkspaceRecord(workspace) {
            return new Promise((resolve, reject) => {
                if (!db || !db.objectStoreNames.contains(WORKSPACE_STORE_NAME)) {
                    try {
                        localStorage.setItem('runningHubWorkspace', JSON.stringify(workspace));
                        resolve();
                    } catch (error) {
                        reject(error);
                    }
                    return;
                }

                const transaction = db.transaction([WORKSPACE_STORE_NAME], 'readwrite');
                const store = transaction.objectStore(WORKSPACE_STORE_NAME);
                const request = store.put(workspace);
                request.onsuccess = () => resolve();
                request.onerror = () => {
                    try {
                        localStorage.setItem('runningHubWorkspace', JSON.stringify(workspace));
                        resolve();
                    } catch (error) {
                        reject(request.error || error);
                    }
                };
            });
        }

        function getWorkspaceRecord() {
            return new Promise((resolve) => {
                if (!db || !db.objectStoreNames.contains(WORKSPACE_STORE_NAME)) {
                    resolve(null);
                    return;
                }

                const transaction = db.transaction([WORKSPACE_STORE_NAME], 'readonly');
                const store = transaction.objectStore(WORKSPACE_STORE_NAME);
                const request = store.get('current');
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => resolve(null);
            });
        }

        function addHistoryItem(imageData, prompt) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                // 保存参考图片数据（只保存有图片的槽位）
                const referenceImages = [];
                imageFiles.forEach((file, index) => {
                    if (file) {
                        // 将 File 对象转换为 Base64 以便存储
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onloadend = () => {
                            referenceImages.push({
                                index: index,
                                dataUrl: reader.result,
                                name: file.name || `image${index + 1}`
                            });
                            
                            // 当所有图片都转换完成后添加到历史记录
                            if (referenceImages.length === imageFiles.filter(f => f !== null).length) {
                                saveToHistory(imageData, prompt, referenceImages, resolve, reject);
                            }
                        };
                    }
                });
                
                // 如果没有参考图，直接保存
                if (imageFiles.filter(f => f !== null).length === 0) {
                    saveToHistory(imageData, prompt, [], resolve, reject);
                }
            });
        }

        function saveToHistory(imageData, prompt, referenceImages, resolve, reject) {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);

            const item = {
                imageData: imageData,
                prompt: prompt,
                referenceImages: referenceImages,
                timestamp: Date.now()
            };

            const request = store.add(item);
            request.onsuccess = () => {
                cleanupOldHistory().then(() => resolve(request.result));
            };
            request.onerror = () => reject(request.error);
        }

        function getAllHistory() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const index = store.index('timestamp');
                const request = index.openCursor(null, 'prev');

                const results = [];
                request.onsuccess = (event) => {
                    const cursor = event.target.result;
                    if (cursor) {
                        results.push(cursor.value);
                        cursor.continue();
                    } else {
                        resolve(results);
                    }
                };
                request.onerror = () => reject(request.error);
            });
        }

        function deleteHistoryItem(id) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function clearAllHistory() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }

                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}天前`;

            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        // 辅助函数：将【imageX】格式的文本转换回 mention chip HTML
        function parsePromptWithMentions(promptText) {
            if (!promptText) return '';
            
            // 使用正则表达式匹配【image数字】格式
            const mentionRegex = /【image(\d+)】/g;
            let result = '';
            let lastIndex = 0;
            let match;
            
            while ((match = mentionRegex.exec(promptText)) !== null) {
                // 添加匹配前的文本
                result += escapeHtml(promptText.slice(lastIndex, match.index));
                
                const imgIndex = parseInt(match[1]) - 1; // 转换为 0-based 索引
                const chipInner = `@img${match[1]} <svg style="width:12px;height:12px;margin-left:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;
                
                // 创建 chip HTML
                result += `<span class="mention-chip" contenteditable="false" data-index="${imgIndex}" onclick="editExistingMention(event, this)">${chipInner}</span>&nbsp;`;
                
                lastIndex = match.index + match[0].length;
            }
            
            // 添加剩余文本
            result += escapeHtml(promptText.slice(lastIndex));
            
            return result;
        }

        // 辅助函数：将 Data URL 转换为 File 对象
        function dataURLToFile(dataurl, filename) {
            return new Promise((resolve, reject) => {

                    .then(response => response.blob())
                    .then(blob => {
                        const file = new File([blob], filename, { type: blob.type });
                        resolve(file);
                    })
                    .catch(error => reject(error));
            });
        }

        // ==================== 图片压缩 ====================
        async function compressImage(file) {
            const enableCompression = document.getElementById('enableCompression').checked;
            if (!enableCompression) {
                return file;
            }

            const maxEdge = parseInt(document.getElementById('maxEdgeLength').value) || 2560;
            const quality = parseFloat(document.getElementById('jpegQuality').value) || 0.9;

            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);

                img.onload = () => {
                    URL.revokeObjectURL(url);

                    let { width, height } = img;
                    const maxDim = Math.max(width, height);

                    if (maxDim <= maxEdge && quality >= 1.0) {
                        resolve(file);
                        return;
                    }

                    if (maxDim > maxEdge) {
                        const scale = maxEdge / maxDim;
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        if (blob) {
                            const compressedFile = new File([blob], file.name, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(compressedFile);
                        } else {
                            reject(new Error('Compression failed'));
                        }
                    }, 'image/jpeg', quality);
                };

                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('Failed to load image'));
                };

                img.src = url;
            });
        }

        async function handleAddNewImage(event) {
            const files = Array.from(event.target.files).filter(f => f.type.startsWith('image/'));
            if (files.length === 0) return;

            const validCount = imageFiles.filter(f => f !== null).length;
            const remaining = 10 - validCount;
            if (remaining <= 0) {
                showMessage('RunningHub API 最多只能上传10张参考图', 'error');
                event.target.value = '';
                return;
            }

            const filesToAdd = files.slice(0, remaining);
            if (files.length > remaining) {
                showMessage(`仅添加了前${remaining}张图片，已达上限`, 'warning');
            }

            for (const file of filesToAdd) {
                let targetIndex = imageFiles.findIndex(f => f === null);
                if (targetIndex === -1) {
                    targetIndex = imageFiles.length;
                    imageFiles.push(null);
                }
                try {
                    imageFiles[targetIndex] = await compressImage(file);
                } catch (error) {
                    console.error('Image compression failed:', error);
                    imageFiles[targetIndex] = file;
                }
            }
            renderImageGrid();
            autoSaveConfig();
            event.target.value = '';
        }

        function focusWithoutScrolling(element) {

        function positionPopup() {
            const popup = document.getElementById('mentionPopup');
            const editor = document.getElementById('prompt');
            const editorRect = editor.getBoundingClientRect();

            const sel = window.getSelection();
            let cursorX = editorRect.left + 20;
            let cursorY = editorRect.top + 50;
            let anchorTop = editorRect.top;

            if (editingChip) {
                const chipRect = editingChip.getBoundingClientRect();
                cursorX = chipRect.left;
                cursorY = chipRect.bottom + 6;
                anchorTop = chipRect.top;
            } else if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const rects = range.getClientRects();
                if (rects.length > 0) {
                    const rect = rects[rects.length - 1];
                    cursorX = rect.left;
                    cursorY = rect.bottom + 5;
                    anchorTop = rect.top;
                }
            }


            const popupWidth = 220;
            const popupHeight = 280;

            if (cursorX + popupWidth > window.innerWidth) {
                cursorX = window.innerWidth - popupWidth - 20;
            }
            if (cursorY + popupHeight > window.innerHeight) {
                cursorY = anchorTop - popupHeight - 6;
            }
            cursorX = Math.max(10, cursorX);
            cursorY = Math.max(10, cursorY);

            popup.style.left = (cursorX - editorRect.left) + 'px';
            popup.style.top = (cursorY - editorRect.top) + 'px';
        }

        function renderMentionList() {
            const list = document.getElementById('mentionPopupList');
            list.innerHTML = '';

            let hasImages = false;
            let visibleCount = 0;

            for (let i = 0; i < imageFiles.length; i++) {
                if (imageFiles[i]) {
                    const tagName = `img${i + 1}`;
                    if (popupKeyword && !tagName.toLowerCase().includes(popupKeyword)) {
                        continue;
                    }

                    hasImages = true;
                    const item = document.createElement('div');
                    item.className = 'mention-popup-item';
                    item.dataset.index = i;
                    item.dataset.visibleIndex = visibleCount;

                    const previewSrc = URL.createObjectURL(imageFiles[i]);
                    item.innerHTML = `
                        <img src="${previewSrc}" alt="img${i + 1}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect fill=%22%231e293b%22 width=%2240%22 height=%2240%22/><text fill=%22%2360a5fa%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>${i + 1}</text></svg>'">

                    `;
                    item.onmousedown = (event) => event.preventDefault();
                    item.onclick = () => selectImageForInsert(i);

            if (!hasImages) {

        function closeMentionPopup() {
            const popup = document.getElementById('mentionPopup');
            const btn = document.getElementById('mentionBtn');

            popup.classList.remove('active');
            btn.classList.remove('active');
            isMentionPopupOpen = false;

            keyboardSelectedIndex = -1;

        function selectImageForInsert(index) {
            const editor = document.getElementById('prompt');
            const editorScrollTop = editor.scrollTop;

            const chipInner = `@img${index + 1} <svg style="width:12px;height:12px;margin-left:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;

            if (editingChip) {
                editingChip.dataset.index = index;
                editingChip.innerHTML = chipInner;
            } else {
                focusWithoutScrolling(editor);

                const sel = window.getSelection();
                let range = savedRange;

                if (!range && sel.rangeCount > 0) {
                    range = sel.getRangeAt(0);
                }

                if (range) {
                    sel.removeAllRanges();
                    sel.addRange(range);

                    if (popupKeyword !== null || isMentionPopupOpen) {
                        const textNode = range.startContainer;
                        if (textNode.nodeType === Node.TEXT_NODE) {
                            const text = textNode.textContent;
                            const cursorPos = range.startOffset;
                            const beforeCursor = text.substring(0, cursorPos);
                            const atIndex = beforeCursor.lastIndexOf('@');
                            if (atIndex !== -1) {
                                range.setStart(textNode, atIndex);
                                range.setEnd(textNode, cursorPos);
                                range.deleteContents();
                            }
                        }
                    }

                    const chip = document.createElement('span');
                    chip.className = 'mention-chip';
                    chip.contentEditable = 'false';
                    chip.dataset.index = index;
                    chip.setAttribute('onclick', 'editExistingMention(event, this)');
                    chip.innerHTML = chipInner;

                    range.insertNode(chip);

                    const space = document.createTextNode('\u00A0');
                    chip.parentNode.insertBefore(space, chip.nextSibling);

                    range.setStart(space, 1);
                    range.setEnd(space, 1);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }

            savedRange = null;
            closeMentionPopup();
            editor.scrollTop = editorScrollTop;
            requestAnimationFrame(() => {
                editor.scrollTop = editorScrollTop;
            });
            autoSaveConfig();
        }

        function updateKeyboardSelection() {
            const items = document.querySelectorAll('.mention-popup-item');
            items.forEach((item, idx) => {
                if (parseInt(item.dataset.visibleIndex) === keyboardSelectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');

            });

        function setupMentionSystem() {
            const editor = document.getElementById('prompt');
            const mentionBtn = document.getElementById('mentionBtn');
            if (mentionBtn) {
                mentionBtn.addEventListener('mousedown', (e) => e.preventDefault());
            }

            editor.addEventListener('paste', function (e) {
                e.preventDefault();
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });

            editor.addEventListener('keydown', function (e) {
                if (e.key === '@') {
                    setTimeout(() => {
                        openMentionPopup();
                    }, 10);
                } else if (isMentionPopupOpen) {
                    handlePopupKeydown(e);
                }
            });

            editor.addEventListener('input', function (e) {
                if (isMentionPopupOpen) {
                    handlePopupInput(e);
                }
            });

            document.addEventListener('click', function (e) {
                const popup = document.getElementById('mentionPopup');
                const btn = document.getElementById('mentionBtn');
                const editor = document.getElementById('prompt');

                if (!popup.contains(e.target) && e.target !== btn && e.target !== editor && !e.target.closest('.mention-chip')) {
                    closeMentionPopup();
                }
            });

            window.addEventListener('resize', function () {
                if (isMentionPopupOpen) {
                    positionPopup();
                }
            });
        }

        function handlePopupKeydown(e) {
            const items = document.querySelectorAll('.mention-popup-item');
            const visibleCount = items.length;

            if (visibleCount === 0) return;

            switch (e.key) {
                case 'Escape':
                    e.preventDefault();
                    closeMentionPopup();
                    removeAtBeforeCursor();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    keyboardSelectedIndex = (keyboardSelectedIndex + 1) % visibleCount;
                    updateKeyboardSelection();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    keyboardSelectedIndex = (keyboardSelectedIndex - 1 + visibleCount) % visibleCount;
                    updateKeyboardSelection();
                    break;
                case 'Enter':
                case 'Tab':
                    e.preventDefault();
                    if (keyboardSelectedIndex >= 0) {
                        const selectedItem = document.querySelector(`.mention-popup-item[data-visible-index="${keyboardSelectedIndex}"]`);
                        if (selectedItem) {
                            selectImageForInsert(parseInt(selectedItem.dataset.index));
                        }
                    }
                    break;
            }
        }

        function handlePopupInput(e) {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const textNode = range.startContainer;

                if (textNode.nodeType === Node.TEXT_NODE) {
                    const text = textNode.textContent;
                    const cursorPos = range.startOffset;
                    const beforeCursor = text.substring(0, cursorPos);

                    const atIndex = beforeCursor.lastIndexOf('@');
                    if (atIndex !== -1) {
                        const keyword = beforeCursor.substring(atIndex + 1);
                        if (!keyword.includes(' ') && !keyword.includes('\n')) {
                            popupKeyword = keyword;
                            renderMentionList();
                            if (document.querySelectorAll('.mention-popup-item').length > 0) {
                                keyboardSelectedIndex = 0;
                                updateKeyboardSelection();
                            }
                            return;
                        }
                    }
                }
            }
            closeMentionPopup();
        }

        function removeAtBeforeCursor() {
            const editor = document.getElementById('prompt');
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const textNode = range.startContainer;
                if (textNode.nodeType === Node.TEXT_NODE) {
                    const text = textNode.textContent;
                    const cursorPos = range.startOffset;
                    const beforeCursor = text.substring(0, cursorPos);
                    const atIndex = beforeCursor.lastIndexOf('@');
                    if (atIndex !== -1 && atIndex === cursorPos - 1) {
                        range.setStart(textNode, atIndex);
                        range.setEnd(textNode, cursorPos);
                        range.deleteContents();
                    }
                }
            }
        }

        function editExistingMention(event, element) {

        function getParsedPromptText() {
            const editor = document.getElementById('prompt');
            let text = '';

            function traverse(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    text += node.textContent.replace(/\u00A0/g, ' ');
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    if (node.classList.contains('mention-chip')) {
                        const idx = parseInt(node.dataset.index) + 1;
                        text += `【image${idx}】`;
                    } else if (node.tagName === 'BR') {
                        text += '\n';
                    } else {
                        for (let child of node.childNodes) {
                            traverse(child);
                        }
                        if ((node.tagName === 'DIV' || node.tagName === 'P') && node.nextSibling) {
                            text += '\n';
                        }
                    }
                }
            }

            traverse(editor);
            return text.replace(/\n{3,}/g, '\n\n').trim();
        }

        async function handleFileSelect(event, index) {
            const files = Array.from(event.target.files).filter(f => f.type.startsWith('image/'));
            if (files.length === 0) return;

            if (files.length === 1) {
                try {
                    imageFiles[index] = await compressImage(files[0]);
                } catch (error) {
                    console.error('Image compression failed:', error);
                    imageFiles[index] = files[0];
                }
            } else {
                const validCount = imageFiles.filter(f => f !== null).length;
                const remaining = 10 - validCount + (imageFiles[index] ? 1 : 0);
                const filesToAdd = files.slice(0, remaining);
                if (files.length > remaining) {
                    showMessage(`仅添加了前${remaining}张图片，已达上限`, 'warning');
                }
                try {
                    imageFiles[index] = await compressImage(filesToAdd[0]);
                } catch (error) {
                    console.error('Image compression failed:', error);
                    imageFiles[index] = filesToAdd[0];
                }
                for (let i = 1; i < filesToAdd.length; i++) {
                    let targetIndex = imageFiles.findIndex(f => f === null);
                    if (targetIndex === -1) {
                        targetIndex = imageFiles.length;
                        imageFiles.push(null);
                    }
                    try {
                        imageFiles[targetIndex] = await compressImage(filesToAdd[i]);
                    } catch (error) {
                        console.error('Image compression failed:', error);
                        imageFiles[targetIndex] = filesToAdd[i];
                    }
                }
            }
            renderImageGrid();
            autoSaveConfig();
            event.target.value = '';
        }

                imageFiles.pop();

        function updatePromptMentionsAfterRemoval(removedIndex) {
            const editor = document.getElementById('prompt');
            const chips = editor.querySelectorAll('.mention-chip');

            chips.forEach(chip => {
                const chipIndex = parseInt(chip.dataset.index);
                if (chipIndex === removedIndex) {
                    const nextSibling = chip.nextSibling;
                    chip.remove();
                    if (nextSibling && nextSibling.nodeType === Node.TEXT_NODE && nextSibling.textContent === '\u00A0') {
                        nextSibling.remove();
                    }
                } else if (chipIndex > removedIndex) {
                    const newIndex = chipIndex - 1;
                    chip.dataset.index = newIndex;
                    chip.innerHTML = `@img${newIndex + 1} <svg style="width:12px;height:12px;margin-left:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;
                }
            });
        }

            const editor = document.getElementById('prompt');
            const chips = editor.querySelectorAll('.mention-chip');
            chips.forEach(chip => {
                const nextSibling = chip.nextSibling;

        function setupPasteListener() {
            document.addEventListener('paste', async (e) => {
                if (document.activeElement.id === 'prompt' || document.activeElement.isContentEditable) return;

                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        const validCount = imageFiles.filter(f => f !== null).length;
                        if (validCount >= 10) {
                            showMessage('RunningHub API 最多只能上传10张参考图', 'error');
                            return;
                        }

                        const blob = item.getAsFile();
                        const file = new File([blob], `pasted-image-${Date.now()}.png`, { type: blob.type });

                        let targetIndex;
                        if (activeSlot === -1) {
                            targetIndex = imageFiles.findIndex(f => f === null);
                            if (targetIndex === -1) {
                                targetIndex = imageFiles.length;
                                imageFiles.push(null);
                            }
                        } else if (activeSlot !== null && activeSlot < imageFiles.length && !imageFiles[activeSlot]) {
                            targetIndex = activeSlot;
                        } else {
                            targetIndex = imageFiles.findIndex(f => f === null);
                            if (targetIndex === -1) {
                                targetIndex = imageFiles.length;
                                imageFiles.push(null);
                            }
                        }

                        try {
                            const compressedFile = await compressImage(file);
                            imageFiles[targetIndex] = compressedFile;
                            renderImageGrid();
                        } catch (error) {
                            console.error('Image compression failed:', error);
                            imageFiles[targetIndex] = file;
                            renderImageGrid();
                        }
                        autoSaveConfig();
                        break;
                    }
                }
            });
        }

        function saveConfig() {

            localStorage.setItem('runningHubConfig', JSON.stringify(config));

        function loadSavedConfig() {
            const saved = localStorage.getItem('runningHubConfig');
            let config = null;

            if (saved) {
                try {
                    config = JSON.parse(saved);
                } catch (e) {
                    console.error('Failed to load config:', e);
                }
            }

            document.getElementById('baseUrl').value = config?.baseUrl || 'https://www.runninghub.cn';
            document.getElementById('apiKey').value = config?.apiKey || '';
            document.getElementById('historyLimit').value = config?.historyLimit || '20';
            document.getElementById('taskHistoryLimit').value = config?.taskHistoryLimit || '50';
            document.getElementById('enableCompression').checked = config?.enableCompression === true;
            document.getElementById('maxEdgeLength').value = config?.maxEdgeLength || '2560';
            document.getElementById('jpegQuality').value = config?.jpegQuality || '0.9';
            document.getElementById('showOfficialAPI').checked = config?.showOfficialAPI === true;
            document.getElementById('maxConcurrency').value = config?.maxConcurrency || '3';
            document.getElementById('pollInterval').value = config?.pollInterval || '8';

            const providerSettings = getDefaultProviderSettings();

            if (config?.providerSettings) {
                Object.keys(providerSettings).forEach(key => {
                    Object.assign(providerSettings[key], config.providerSettings[key] || {});
                });
            }

            // 向后兼容旧配置
            if (!config?.providerSettings && config?.aspectRatio !== undefined) {
                providerSettings.nanobanana.aspectRatio = config.aspectRatio;
            }
            if (!config?.providerSettings && config?.resolution !== undefined) {
                providerSettings.nanobanana.resolution = config.resolution;
            }
            if (!config?.providerSettings && config?.modelType !== undefined) {
                providerSettings.nanobanana.modelType = config.modelType;
            }

            const savedProvider = config?.activeProvider || 'nanobanana';
            const showOfficial = config?.showOfficialAPI === true;
            document.querySelectorAll('.official-tab').forEach(tab => {
                tab.style.display = showOfficial ? '' : 'none';
            });
            const finalProvider = (!showOfficial && MODEL_PROFILES[savedProvider]?.isOfficial) ? 'nanobanana' : savedProvider;
            setActiveProvider(finalProvider, {
                preserveCurrent: false,
                providerSettings
            });
            localStorage.setItem('runningHubProviderSettings', JSON.stringify(providerSettings));
        }

        function exportConfig() {
            const config = buildConfigPayload();

            a.href = url;

        function importConfig(event) {
