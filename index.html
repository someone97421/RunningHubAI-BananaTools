            const resultImage = document.getElementById('resultImage');
            const downloadLink = document.getElementById('downloadLink');
            const jsonResult = document.getElementById('jsonResult');
            const imageSrc = extractImageSource(task.result);

            resultArea.classList.remove('hidden');

            if (imageSrc) {
                resultImage.src = imageSrc;
                downloadLink.href = imageSrc;
                downloadLink.download = `generated-${Date.now()}.png`;
                if (jsonResult) jsonResult.classList.add('hidden');
            } else {
                showMessage('返回数据格式异常', 'error');
                if (jsonResult) {
                    jsonResult.textContent = JSON.stringify(task.result, null, 2);
                    jsonResult.classList.remove('hidden');
                }
            }

            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 保存任务结果到历史记录
        async function saveTaskResultToHistory(task) {
            try {
                let imageData = null;
                const imageSrc = extractImageSource(task.result);

                if (imageSrc) {
                    try {
                        const response = await fetch(imageSrc);
                        const blob = await response.blob();
                        imageData = await blobToBase64(blob);
                    } catch (e) {
                        console.error('Failed to fetch image from URL:', e);
                        imageData = imageSrc;
                    }
                }

                if (imageData) {
                    await addHistoryItem(imageData, task.prompt);
                    await loadHistory();
                }
            } catch (error) {
                console.error('Failed to save to history:', error);
            }
        }

        // 当前选中的任务ID
        let selectedTaskId = null;

        // 页面通知和标题状态
        const ORIGINAL_TITLE = 'RunningHubAI 图像生成器';
        let titleFlashInterval = null;
        let currentBaseTitle = ORIGINAL_TITLE;

        function triggerSuccessNotification() {
            // Play notification sound
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.error('Audio notification failed:', e);
            }

            // Flash title if not already flashing
            if (!titleFlashInterval) {
                let isFlash = false;
                titleFlashInterval = setInterval(() => {
                    isFlash = !isFlash;
                    document.title = isFlash ? '🟢 ' + currentBaseTitle : currentBaseTitle;
                }, 800);

                const stopFlashing = () => {
                    if (titleFlashInterval) {
                        clearInterval(titleFlashInterval);
                        titleFlashInterval = null;
                        document.title = currentBaseTitle;
                    }
                    window.removeEventListener('focus', stopFlashing);
                    window.removeEventListener('click', stopFlashing);
                    window.removeEventListener('keydown', stopFlashing);
                };
                window.addEventListener('focus', stopFlashing);
                window.addEventListener('click', stopFlashing);
                window.addEventListener('keydown', stopFlashing);
            }
        }

        function getTaskStatusText(status) {
            return {
                'pending': '等待中',
                'submitting': '提交中',
                'polling': '生成中',
                'completed': '已完成',
                'failed': '失败'
            }[status] || status;
        }

        function taskElementId(taskId) {
            return `task-item-${taskId}`;
        }

        function renderTaskDebugPanel(task) {
            const uploadRecords = task.uploadRecords || [];
            const uploadStagesHtml = uploadRecords.length > 0 ? `
                <div class="upload-stage-list">
                    ${uploadRecords.map(record => `
                        <div class="upload-stage-item">
                            <div class="upload-stage-main">
                                <div class="upload-stage-name">${escapeHtml(record.name || `reference-${record.index}`)}</div>
                                <div class="upload-stage-detail">${escapeHtml(record.detail || record.error || '等待处理')}</div>
                            </div>
                            <span class="upload-stage-badge">${escapeHtml(`${record.status || 'waiting'} ${record.progress || 0}%`)}</span>
                        </div>
                    `).join('')}
                </div>
            ` : '';
            const debugInfo = {
                id: task.id,
                serverTaskId: task.serverTaskId,
                providerId: task.providerId,
                label: task.label,
                status: task.status,
                progress: task.progress,
                prompt: task.prompt,
                params: task.params,
                uploadStrategy: task.uploadStrategy,
                uploadRecords: task.uploadRecords || [],
                submitSummary: task.submitSummary || null,
                timeline: task.timeline || [],
                imageCount: task.images.length,
                isImageToImage: task.images.length > 0,
                error: task.error,
                pollAttempts: task.pollAttempts,
                startTime: new Date(task.startTime).toLocaleString(),
                result: task.result ? '已返回数据' : null
            };

            return `
                <div class="task-debug-panel" onclick="event.stopPropagation()">
                    <div class="task-debug-header">
                        <span>任务调试信息</span>
                        <button onclick="closeTaskDebugPanel(event)" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px;">✕</button>
                    </div>
                    ${uploadStagesHtml}
                    <div class="task-debug-content">${JSON.stringify(debugInfo, null, 2)}</div>
                </div>
            `;
        }

        function renderTaskItemInner(task) {
            const isSelected = task.id === selectedTaskId;
            const progress = parseInt(task.progress) || 0;
            return `
                <div class="task-header">
                    <span class="task-id">${task.id.slice(-8)}</span>
                    <span class="task-status ${task.status}">${getTaskStatusText(task.status)}</span>
                </div>
                <div class="task-model-label">${escapeHtml(task.label || 'NanoBanana')}</div>
                <div class="task-prompt" title="${escapeHtml(task.prompt)}">${escapeHtml(task.prompt)}</div>
                ${task.status === 'polling' || task.status === 'submitting' ? `
                    <div class="task-progress-bar">
                        <div class="task-progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="task-progress-text">${progress}%</div>
                ` : ''}
                ${task.status === 'failed' ? `
                    <div class="task-progress-text" style="color: #ef4444;">${escapeHtml(task.error || '未知错误')}</div>
                ` : ''}
                ${isSelected ? renderTaskDebugPanel(task) : ''}
            `;
        }

        function renderTaskItem(task) {
            const isSelected = task.id === selectedTaskId;
            return `
                <div id="${escapeHtml(taskElementId(task.id))}" class="task-item ${task.status} ${isSelected ? 'selected' : ''}"
                     data-task-id="${escapeHtml(task.id)}" onclick="selectTask('${escapeHtml(task.id)}')">
                    ${renderTaskItemInner(task)}
                </div>
            `;
        }

        // 更新任务UI
        function updateTaskUI(changedTask) {
            const taskContainer = document.getElementById('taskContainer');
            const taskCountEl = document.getElementById('taskCount');
            const taskFloatCountEl = document.getElementById('taskFloatCount');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('btnLoader');
            
            // 记录之前的调试面板滚动位置
            let debugScrollTop = 0;
            const existingDebugContent = document.querySelector('.task-debug-content');
            if (existingDebugContent) {
                debugScrollTop = existingDebugContent.scrollTop;
            }

            const pendingCount = taskQueue.filter(t => t.status === 'pending').length;
            const runningCount = taskQueue.filter(t => t.status === 'submitting' || t.status === 'polling').length;
            const completedCount = taskQueue.filter(t => t.status === 'completed').length;
            const failedCount = taskQueue.filter(t => t.status === 'failed').length;
            const activeTaskCount = pendingCount + runningCount;
            
            // 更新按钮状态
            if (activeTaskCount > 0) {
                btnText.textContent = `添加任务队列 (${activeTaskCount})`;
                loader.classList.remove('hidden');
            } else {
                btnText.textContent = '添加任务队列';
                loader.classList.add('hidden');
            }

            // 更新标签页标题
            currentBaseTitle = activeTaskCount > 0 ? `(${activeTaskCount}) ${ORIGINAL_TITLE}` : ORIGINAL_TITLE;
            if (!titleFlashInterval) {
                document.title = currentBaseTitle;
            }
            
            // 更新任务数量
            taskCountEl.textContent = taskQueue.length;
            if (taskFloatCountEl) {
                taskFloatCountEl.textContent = activeTaskCount;
                taskFloatCountEl.style.display = activeTaskCount > 0 ? 'inline-flex' : 'none';
            }
            
            // 渲染任务列表
            if (taskQueue.length === 0) {
                taskContainer.innerHTML = `
                    <div class="text-center py-8 text-sm" style="color: var(--text-muted);">
                        暂无任务
                    </div>
                `;
            } else {
                const orderedTasks = taskQueue.slice().reverse();
                const changedTaskInList = changedTask && orderedTasks.some(task => task.id === changedTask.id);
                const changedTaskEl = changedTaskInList ? document.getElementById(taskElementId(changedTask.id)) : null;
                const canPatchSingleTask =
                    changedTaskEl &&
                    changedTask.id !== selectedTaskId &&
                    taskContainer.querySelectorAll('.task-item').length === orderedTasks.length;

                if (canPatchSingleTask) {
                    changedTaskEl.className = `task-item ${changedTask.status}`;
                    changedTaskEl.innerHTML = renderTaskItemInner(changedTask);
                } else {
                    taskContainer.innerHTML = orderedTasks.map(renderTaskItem).join('');
                }
            }
            
            // 恢复调试面板滚动位置
            const newDebugContent = document.querySelector('.task-debug-content');
            if (newDebugContent && debugScrollTop > 0) {
                newDebugContent.scrollTop = debugScrollTop;
            }
            
            // 如果有状态变化，显示消息
            if (changedTask) {
                if (changedTask.status === 'completed') {
                    showMessage(`任务 ${changedTask.id.slice(-4)} 完成`, 'success');
                    if (document.hidden) {
                        triggerSuccessNotification();
                    }
                } else if (changedTask.status === 'failed') {
                    showMessage(`任务 ${changedTask.id.slice(-4)} 失败: ${changedTask.error}`, 'error');
                }
            }
        }

        // 选择任务
        function selectTask(taskId) {
            if (selectedTaskId === taskId) {
                selectedTaskId = null; // 再次点击已展开的卡片则收起
            } else {
                selectedTaskId = taskId; // 展开新的，自动收起其他的
            }
            updateTaskUI();
        }

        // 关闭任务调试面板
        function closeTaskDebugPanel(event) {
            if (event) {
                event.stopPropagation();
            }
            selectedTaskId = null;
            updateTaskUI();
        }

        // 清理所有任务
        async function clearAllTasks() {
            if (taskQueue.length === 0) return;
            if (!(await requestConfirm(
                '确定要清理任务列表吗？',
                '正在轮询的任务会停止，本地任务记录会被清空。',
                '清理'
            ))) {
                return;
            }
            
            // 停止所有轮询定时器
            taskQueue.forEach(task => {
                if (task.pollTimer) {
                    clearInterval(task.pollTimer);
                }
            });
            
            taskQueue = [];
            runningTaskCount = 0;
            selectedTaskId = null;
            localStorage.removeItem(TASK_HISTORY_KEY);
            
            const debugPanel = document.getElementById('taskDebugPanel');
            if (debugPanel) {
                debugPanel.remove();
            }
            
            updateTaskUI();
            showMessage('任务列表已清理', 'success');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 图像生成 - 使用任务队列 - 适配 RunningHubAI API
        async function generateImage() {
            const baseUrl = normalizeRunningHubBaseUrl(document.getElementById('baseUrl').value);
            document.getElementById('baseUrl').value = baseUrl;
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = getParsedPromptText();
            const params = collectProviderSettings();

            if (!baseUrl || !apiKey) {
                showMessage('请填写 RunningHubAI Base URL 和 API Key', 'error');
                return;
            }
            if (!prompt) {
                showMessage('请输入提示词', 'error');
                return;
            }

            const validImages = imageFiles.filter(f => f !== null);
            const maxReferenceCount = getMaxReferenceCount(activeProvider, params);
            if (validImages.length > maxReferenceCount) {
                showMessage(`当前模型最多支持 ${maxReferenceCount} 个参考文件`, 'error');
                return;
            }
            
            hideMessage();

            // 创建新任务并加入队列
            createTask(baseUrl, apiKey, activeProvider, prompt, params, validImages);
            
            showMessage('任务已添加到队列', 'success');
            
            // 更新按钮状态
            updateTaskUI({ status: 'pending' });
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function showMessage(msg, type) {
            const stack = document.getElementById('toastStack');
            if (!stack) return;
            const toast = document.createElement('div');
            const normalizedType = ['success', 'warning', 'error', 'info'].includes(type) ? type : 'info';
            toast.className = `toast-item ${normalizedType}`;
            toast.innerHTML = `
                <div class="toast-text">${escapeHtml(msg)}</div>
                <button type="button" class="toast-close" title="关闭提示" aria-label="关闭提示">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            `;
            const close = () => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-8px) scale(0.98)';
                setTimeout(() => toast.remove(), 160);
            };
            toast.querySelector('.toast-close').onclick = close;
            stack.prepend(toast);
            while (stack.children.length > 4) {
                stack.lastElementChild.remove();
            }
            setTimeout(close, normalizedType === 'error' ? 5200 : 3200);
        }

        function hideMessage() {
            const stack = document.getElementById('toastStack');
            if (stack) {
                stack.innerHTML = '';
            }
        }

        // 键盘快捷键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const confirmModal = document.getElementById('confirmModal');
                if (confirmModal?.classList.contains('active')) {
                    closeConfirmModal(false);
                    return;
                }
                closeImageModal();
            }
        });
    </script>
